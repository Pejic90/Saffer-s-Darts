  #app { position:relative; z-index:1; }
  button, input, select { font-family:inherit; }
  button { border:none; cursor:pointer; -webkit-appearance:none; appearance:none; }
  input, select { -webkit-appearance:none; appearance:none; }
  .press:active { transform:scale(0.96); }
  .fade-in { animation:fadeIn .25s ease; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:translateY(0)} }
  @keyframes spin { to { transform:rotate(360deg); } }
  @keyframes introSlideTop { 0% { transform:translateY(-170%) scale(0.7); opacity:0; } 75% { transform:translateY(6%) scale(1.04); opacity:1; } 100% { transform:translateY(0) scale(1); opacity:1; } }
  @keyframes introSlideBottom { 0% { transform:translateY(170%) scale(0.7); opacity:0; } 75% { transform:translateY(-6%) scale(1.04); opacity:1; } 100% { transform:translateY(0) scale(1); opacity:1; } }
  @keyframes introPop { 0% { transform:scale(0) rotate(-10deg); opacity:0; } 75% { transform:scale(1.3) rotate(-10deg); opacity:1; } 100% { transform:scale(1) rotate(-10deg); opacity:1; } }
  .intro-left { animation: introSlideTop 2.0s cubic-bezier(.22,1,.36,1) both; }
  .intro-right { animation: introSlideBottom 2.0s cubic-bezier(.22,1,.36,1) both 1.5s; }
  .intro-vs { animation: introPop 0.9s ease both 3.3s; }
  @keyframes splashGrow { 0% { transform:scale(0.02); opacity:0; } 12% { opacity:1; } 100% { transform:scale(1); opacity:1; } }
  .splash-logo { animation: splashGrow 3.4s cubic-bezier(.19,1,.22,1) both; }
  .spin { animation:spin 1s linear infinite; }
  .display { font-family:'Oswald',sans-serif; }
  .mono { font-family:'JetBrains Mono',monospace; }
  #app { min-height:100vh; padding-bottom:96px; background:var(--bg); }
  .row { display:flex; align-items:center; }
  .between { justify-content:space-between; }
  .center { justify-content:center; }
  .col { display:flex; flex-direction:column; }
  .card { background:rgba(22,40,29,0.66); backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px); border:1px solid var(--panel-border); border-radius:16px; padding:14px; }
  .hidden { display:none !important; }
  .avatar { border-radius:9999px; object-fit:cover; flex-shrink:0; color:#fff; display:flex; align-items:center; justify-content:center; font-weight:600; }
  .btn-gold { background:var(--gold); color:#241C05; font-weight:600; border-radius:12px; }
  .btn-panel { background:var(--panel); color:var(--cream); border:1px solid var(--panel-border); border-radius:12px; }
  .btn-soft { background:var(--bg-soft); color:var(--cream-dim); border-radius:12px; }
  .field-input { width:100%; background:rgba(18,35,24,0.85); color:var(--cream); border:1px solid var(--panel-border); border-radius:12px; padding:10px 14px; font-size:14px; outline:none; }
  .icon-btn { border-radius:10px; padding:6px; background:transparent; }
  .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.6); display:flex; align-items:center; justify-content:center; z-index:50; padding:20px; }
  .modal-panel { width:100%; max-width:420px; background:rgba(22,40,29,0.94); backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px); border:1px solid var(--panel-border); border-radius:24px; padding:20px; padding-bottom:24px; max-height:85vh; overflow-y:auto; }
  .bottom-nav { position:fixed; bottom:0; left:0; right:0; background:rgba(18,35,24,0.82); backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px); border-top:1px solid var(--panel-border); display:flex; align-items:center; justify-content:space-around; padding:10px 0; z-index:40; }
  .nav-btn { display:flex; flex-direction:column; align-items:center; gap:4px; background:transparent; padding:4px 8px; flex:1; min-width:0; }
  .mode-chip { border-radius:10px; padding:6px 12px; font-size:12px; font-weight:500; background:var(--bg-soft); color:var(--cream-dim); }
  .mode-chip.active { background:var(--gold); color:#241C05; }
</style>

  let introTimer = null;
  let introAudioEl = null;
  function showMatchIntro(playerAId, playerBId, onDone) {
    state.introPlayerAId = playerAId;
    state.introPlayerBId = playerBId;
    state.introOnDone = onDone;
    state.modal = "matchIntro";
    render();
    if (introTimer) clearTimeout(introTimer);
    try {
      introAudioEl = new Audio(MATCH_INTRO_AUDIO);
      introAudioEl.play().catch(() => {});
    } catch (e) {}
    introTimer = setTimeout(() => { window.proceedFromIntro(); }, 6450);
  }
  window.proceedFromIntro = function () {
    if (introTimer) { clearTimeout(introTimer); introTimer = null; }
    if (introAudioEl) { try { introAudioEl.pause(); introAudioEl.currentTime = 0; } catch (e) {} introAudioEl = null; }
    const cb = state.introOnDone;
    state.introOnDone = null;
    if (cb) cb();
  };
  function playConfirmSound() {
    try { new Audio(CONFIRM_SOUND_AUDIO).play().catch(() => {}); } catch (e) {}
  }

  /* ---------------- Match Start (Wurf-für-Wurf) ---------------- */
  window.openFullMatch = function (matchId) {
    const m = state.matches.find((x) => x.id === matchId);
    if (!m) return;
    const modeNum = parseInt(((m.mode || "Best of 3").match(/\d+/) || [3])[0], 10) || 3;
    const legsToWin = Math.ceil(modeNum / 2);
    state.fullMode = {
      context: "league", matchId, playerAId: m.playerAId, playerBId: m.playerBId,
      legsToWin, legsA: 0, legsB: 0,
      leg: null, legsHistory: [],
      scoreInput: "", error: "", awaitingDarts: false, pendingCheckoutScore: null,
    };
    showMatchIntro(m.playerAId, m.playerBId, () => { state.modal = "fullMatchSetup"; render(); });
  };
  window.openTournamentFullMatch = function (roundIndex, matchId) {
    const t = state.tournaments.find((x) => x.id === state.tournamentDetailId);
    if (!t) return;
    const m = tournamentMatchAt(t, roundIndex, matchId);
    if (!m) return;
    state.fullMode = {
      context: "tournament", tournamentId: t.id, roundIndex, matchId,
      playerAId: m.playerAId, playerBId: m.playerBId,
      legsToWin: 3, legsA: 0, legsB: 0,
      leg: null, legsHistory: [],
      scoreInput: "", error: "", awaitingDarts: false, pendingCheckoutScore: null,
    };
    showMatchIntro(m.playerAId, m.playerBId, () => { state.modal = "fullMatchSetup"; render(); });
  };
  window.startFullMatch = function (who) {
    const fm = state.fullMode;
    if (!fm) return;
    fm.leg = { remaining: { a: 501, b: 501 }, thrower: who, startThrower: who, turns: [] };
    state.modal = "fullMatchPlay";
    render();
  };
  window.setFullScoreInput = function (el) {
    const fm = state.fullMode;
    if (!fm) return;
    const clean = String(el.value).replace(/[^0-9]/g, "").slice(0, 3);
    if (el.value !== clean) el.value = clean;
    fm.scoreInput = clean;
    fm.error = "";
    // No render() here: re-rendering would rebuild the input and drop the keyboard.
  };
  window.tapFullQuickScore = function (v) {
    const fm = state.fullMode;
    if (!fm) return;
    fm.scoreInput = String(v);
    fm.error = "";
    render();
  };
  window.confirmFullTurn = function () {
    const fm = state.fullMode;
    if (!fm || !fm.leg || fm.awaitingDarts) return;
    const raw = fm.scoreInput;
    if (raw === "") { fm.error = "Bitte Punktzahl eingeben"; render(); return; }
    const score = parseInt(raw, 10);
    if (isNaN(score) || score < 0 || score > 180) { fm.error = "Punktzahl muss zwischen 0 und 180 liegen"; render(); return; }
    const who = fm.leg.thrower;
    const remBefore = fm.leg.remaining[who];
    const remAfter = remBefore - score;
    if (remAfter < 0 || remAfter === 1) {
      fm.error = `Bust! Rest wäre ${remAfter} – bitte korrigieren (Rest bleibt bei ${remBefore})`;
      render();
      return;
    }
    if (remAfter === 0) {
      fm.pendingCheckoutScore = score;
      fm.awaitingDarts = true;
      fm.error = "";
      render();
      return;
    }
    fm.leg.turns.push({ who, score, dartsUsed: 3, checkout: false });
    fm.leg.remaining[who] = remAfter;
    fm.leg.thrower = who === "a" ? "b" : "a";
    fm.scoreInput = "";
    fm.error = "";
    render();
  };
  window.bustFullTurn = function () {
    const fm = state.fullMode;
    if (!fm || !fm.leg || fm.awaitingDarts) return;
    const who = fm.leg.thrower;
    // Bust: score stays unchanged, turn is void (0 points). The 3 darts thrown DO count
    // toward the average (0 points / 3 darts), which correctly lowers it. Switch player.
    fm.leg.turns.push({ who, score: 0, dartsUsed: 3, checkout: false, bust: true });
    fm.leg.thrower = who === "a" ? "b" : "a";
    fm.scoreInput = "";
    fm.error = "";
    render();
  };
  window.confirmFullDarts = function (n) {
    const fm = state.fullMode;
    if (!fm || !fm.awaitingDarts) return;
    const who = fm.leg.thrower;
    const score = fm.pendingCheckoutScore;
    fm.leg.turns.push({ who, score, dartsUsed: n, checkout: true });
    fm.leg.remaining[who] = 0;
    fm.legsHistory.push({ winner: who, turns: fm.leg.turns.slice() });
    if (who === "a") fm.legsA++; else fm.legsB++;
    fm.awaitingDarts = false;
    fm.pendingCheckoutScore = null;
    fm.scoreInput = "";
    fm.error = "";
    if (fm.legsA >= fm.legsToWin || fm.legsB >= fm.legsToWin) {
      finishFullMatch();
      return;
    }
    const nextStart = fm.leg.startThrower === "a" ? "b" : "a";
    fm.leg = { remaining: { a: 501, b: 501 }, thrower: nextStart, startThrower: nextStart, turns: [] };
    render();
  };
  window.undoFullTurn = function () {
    const fm = state.fullMode;
    if (!fm || !fm.leg || fm.awaitingDarts || fm.leg.turns.length === 0) return;
    const last = fm.leg.turns.pop();
    fm.leg.remaining[last.who] += last.score;
    fm.leg.thrower = last.who;
    fm.scoreInput = "";
    fm.error = "";
    render();
  };
  window.cancelFullMatch = function () {
    if (!state.fullMode) { state.modal = null; render(); return; }
    if (state.confirmCancelFullArmed) {
      state.fullMode = null;
      state.confirmCancelFullArmed = false;
      state.modal = null;
      render();
    } else {
      state.confirmCancelFullArmed = true;
      render();
      setTimeout(() => { state.confirmCancelFullArmed = false; render(); }, 3000);
    }
  };
  function finishFullMatch() {
    const fm = state.fullMode;
    let ptsA = 0, dartsA = 0, ptsB = 0, dartsB = 0, coA = null, coB = null;
    fm.legsHistory.forEach((leg) => {
      leg.turns.forEach((t) => {
        if (t.who === "a") { ptsA += t.score; dartsA += t.dartsUsed; if (t.checkout && (coA === null || t.score > coA)) coA = t.score; }
        else { ptsB += t.score; dartsB += t.dartsUsed; if (t.checkout && (coB === null || t.score > coB)) coB = t.score; }
      });
    });
    const avgA = dartsA ? (ptsA / dartsA * 3) : null;
    const avgB = dartsB ? (ptsB / dartsB * 3) : null;
    const resultFields = {
      legsA: fm.legsA, legsB: fm.legsB,
      checkoutA: coA != null ? coA : null, checkoutB: coB != null ? coB : null,
      avgA: avgA != null ? Number(avgA.toFixed(2)) : null, avgB: avgB != null ? Number(avgB.toFixed(2)) : null,
    };
    if (fm.context === "tournament") {
      const t = state.tournaments.find((x) => x.id === fm.tournamentId);
      const ri = fm.roundIndex, mid = fm.matchId;
      state.fullMode = null;
      playConfirmSound();
      if (t) applyTournamentResult(t, ri, mid, resultFields);
      state.modal = null;
      render();
      return;
    }
    state.activeMatchId = fm.matchId;
    state.resultForm = {
      legsA: fm.legsA, legsB: fm.legsB,
      checkoutA: coA != null ? String(coA) : "", checkoutB: coB != null ? String(coB) : "",
      avgA: avgA != null ? avgA.toFixed(2) : "", avgB: avgB != null ? avgB.toFixed(2) : "",
    };
    state.fullMode = null;
    window.confirmResult();
  }

  function genId() {
    if (typeof crypto !== "undefined" && crypto.randomUUID) return crypto.randomUUID();
    return "id_" + Date.now().toString(36) + "_" + Math.random().toString(36).slice(2, 8);
  }

  function tsVal(ts) { return ts && ts.seconds ? ts.seconds : 0; }
  function activeLeague() { return state.leagues.find((l) => l.status === "aktiv") || null; }
  function bootstrapLeagueId() {
    if (!state.leagues.length) return null;
    const sorted = state.leagues.slice().sort((a, b) => tsVal(a.createdAt) - tsVal(b.createdAt));
    return sorted[0].id;
  }
  function leagueIdForMatch(m) { return m.leagueId || bootstrapLeagueId(); }
  function matchesForLeague(leagueId) { return state.matches.filter((m) => leagueIdForMatch(m) === leagueId); }
  function currentKoPhase() {
    const lg = activeLeague();
    if (!lg) return null;
    return state.koPhases.find((k) => k.id === lg.id) || null;
  }
  function leagueChampion(leagueId) {
    const ko = state.koPhases.find((k) => k.id === leagueId);
    if (ko && ko.status === "beendet" && ko.winnerId) {
      return state.players.find((p) => p.id === ko.winnerId) || { id: ko.winnerId, name: "?" };
    }
    const standings = computeStandings("gesamt", leagueId);
    return standings.length ? standings[0].player : null;
  }

  function esc(s) {
    return String(s == null ? "" : s).replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
  }

  function initials(name) {
    const parts = String(name).trim().split(/\s+/);
    if (parts.length === 1) return parts[0].slice(0, 2).toUpperCase();
    return (parts[0][0] + parts[parts.length - 1][0]).toUpperCase();
  }

  function avatarColor(id) {
    let hash = 0;
    for (let i = 0; i < id.length; i++) hash = (hash * 31 + id.charCodeAt(i)) >>> 0;
    return AVATAR_PALETTE[hash % AVATAR_PALETTE.length];
  }

  function avatarHTML(player, size) {

      return `<img class="avatar" src="${player.photo}" alt="${esc(player.name)}" style="width:${size}px;height:${size}px;">`;

  function playerName(id) {
    const p = state.players.find((x) => x.id === id);
    return p ? p.name : "?";

  function shuffleArr(arr) {
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      const tmp = a[i]; a[i] = a[j]; a[j] = tmp;
    }
    return a;
  }

  function nextPowerOf2(n) {
    let p = 1;
    while (p < n) p *= 2;
    return p;
  }

  function newTournamentMatch(a, b) {
    return {
      id: genId(), playerAId: a, playerBId: b,
      legsA: null, legsB: null, checkoutA: null, checkoutB: null, avgA: null, avgB: null,
      status: "geplant", winnerId: null,
    };
  }

  // Firestore rejects nested arrays, so each round is wrapped as { matches: [...] } (same as KO-phase).
  function buildFirstRound(playerIds) {
    const shuffled = shuffleArr(playerIds);
    const bracketSize = nextPowerOf2(shuffled.length);
    const numPairs = bracketSize / 2;
    const byesNeeded = bracketSize - shuffled.length;
    // Randomly decide which pairs become a wildcard (Freilos) when the count is odd/not a power of 2.
    const byePairSet = new Set(shuffleArr(Array.from({ length: numPairs }, (_, i) => i)).slice(0, byesNeeded));
    let ptr = 0;
    const matches = [];
    for (let p = 0; p < numPairs; p++) {
      const a = shuffled[ptr++];
      const isBye = byePairSet.has(p);
      const b = isBye ? null : shuffled[ptr++];
      const m = newTournamentMatch(a, b);
      if (isBye) { m.status = "beendet"; m.winnerId = a; }
      matches.push(m);
    }
    return { matches: matches };
  }

  function buildNextTournamentRound(prevRound) {
    const winners = prevRound.matches.map((m) => m.winnerId);
    const matches = [];
    for (let i = 0; i < winners.length; i += 2) {
      matches.push(newTournamentMatch(winners[i], winners[i + 1] === undefined ? null : winners[i + 1]));
    }
    return { matches: matches };
  }

  function advanceTournament(rounds) {
    const lastRound = rounds[rounds.length - 1];
    const complete = lastRound.matches.every((m) => m.status === "beendet");
    if (!complete) return { rounds, status: "laufend", winnerId: null };
    if (lastRound.matches.length === 1) return { rounds, status: "beendet", winnerId: lastRound.matches[0].winnerId };
    return { rounds: [...rounds, buildNextTournamentRound(lastRound)], status: "laufend", winnerId: null };
  }

  function roundLabel(len, idx) {
    if (len === 1) return "Finale";
    if (len === 2) return "Halbfinale";
    if (len === 4) return "Viertelfinale";
    if (len === 8) return "Achtelfinale";
    return "Runde " + (idx + 1);
  }

  function buildKoPhase(standings) {
    const seedPlayer = (rank) => standings[rank - 1].player.id;
    const seeds = {};
    for (let r = 1; r <= 8; r++) seeds[r] = seedPlayer(r);
    const playoff = [
      { id: genId(), playerAId: seeds[3], playerBId: seeds[6], legsA: null, legsB: null, status: "geplant", winnerId: null },
      { id: genId(), playerAId: seeds[4], playerBId: seeds[5], legsA: null, legsB: null, status: "geplant", winnerId: null },
    ];
    return {
      status: "laufend",
      startedAt: firebase.firestore.FieldValue.serverTimestamp(),
      seeds: seeds,
      rounds: [{ name: "Ausspielung", matches: playoff }],
      winnerId: null,
    };
  }

  function advanceKoPhase(koData) {
    const rounds = koData.rounds;
    const last = rounds[rounds.length - 1];
    const complete = last.matches.every((m) => m.status === "beendet");
    if (!complete) return { rounds, status: "laufend", winnerId: null };
    if (last.name === "Ausspielung") {
      const winner36 = last.matches[0].winnerId;
      const winner45 = last.matches[1].winnerId;
      const semis = [
        { id: genId(), playerAId: koData.seeds[1], playerBId: winner45, legsA: null, legsB: null, status: "geplant", winnerId: null },
        { id: genId(), playerAId: koData.seeds[2], playerBId: winner36, legsA: null, legsB: null, status: "geplant", winnerId: null },
      ];
      return { rounds: [...rounds, { name: "Halbfinale", matches: semis }], status: "laufend", winnerId: null };
    }
    if (last.name === "Halbfinale") {
      const final = [{ id: genId(), playerAId: last.matches[0].winnerId, playerBId: last.matches[1].winnerId, legsA: null, legsB: null, status: "geplant", winnerId: null }];
      return { rounds: [...rounds, { name: "Finale", matches: final }], status: "laufend", winnerId: null };
    }
    return { rounds, status: "beendet", winnerId: last.matches[0].winnerId };
  }

  function computeStandings(roundFilter, leagueId) {
    roundFilter = roundFilter || "gesamt";
    leagueId = leagueId || (activeLeague() && activeLeague().id);
    const scopedMatches = leagueId ? matchesForLeague(leagueId) : [];
    const stats = {};
    state.players.forEach((p) => { stats[p.id] = { player: p, played: 0, wins: 0, losses: 0, legsFor: 0, legsAgainst: 0, points: 0 }; });
    scopedMatches
      .filter((m) => m.status === "beendet" && stats[m.playerAId] && stats[m.playerBId] && (roundFilter === "gesamt" || (m.round || "Hinrunde") === roundFilter))
      .forEach((m) => {
        const a = stats[m.playerAId], b = stats[m.playerBId];
        a.played++; b.played++;
        a.legsFor += m.legsA; a.legsAgainst += m.legsB;
        b.legsFor += m.legsB; b.legsAgainst += m.legsA;
        if (m.legsA > m.legsB) { a.wins++; a.points += 2; b.losses++; }
        else if (m.legsB > m.legsA) { b.wins++; b.points += 2; a.losses++; }
      });
    return Object.values(stats).sort((x, y) =>
      y.points - x.points ||
      (y.legsFor - y.legsAgainst) - (x.legsFor - x.legsAgainst) ||
      x.player.name.localeCompare(y.player.name)
    );
  }

  function computePlayerDetail(playerId, roundFilter) {
    roundFilter = roundFilter || "gesamt";
    const lg = activeLeague();
    const scopedMatches = lg ? matchesForLeague(lg.id) : [];
    let wins = 0, losses = 0, legsFor = 0, legsAgainst = 0, played = 0;
    const headToHead = {};
    scopedMatches
      .filter((m) => m.status === "beendet" && (m.playerAId === playerId || m.playerBId === playerId) && (roundFilter === "gesamt" || (m.round || "Hinrunde") === roundFilter))
      .forEach((m) => {
        played++;
        const isA = m.playerAId === playerId;
        const my = isA ? m.legsA : m.legsB;
        const opp = isA ? m.legsB : m.legsA;
        const oppId = isA ? m.playerBId : m.playerAId;
        legsFor += my; legsAgainst += opp;
        if (!headToHead[oppId]) headToHead[oppId] = { wins: 0, losses: 0, legsFor: 0, legsAgainst: 0 };
        headToHead[oppId].legsFor += my;
        headToHead[oppId].legsAgainst += opp;
        if (my > opp) { wins++; headToHead[oppId].wins++; }
        else if (opp > my) { losses++; headToHead[oppId].losses++; }
      });
    let maxCheckout = null, avgSum = 0, avgCount = 0;
    state.matches
      .filter((m) => m.status === "beendet" && (m.playerAId === playerId || m.playerBId === playerId))
      .forEach((m) => {
        const isA = m.playerAId === playerId;
        const co = isA ? m.checkoutA : m.checkoutB;
        const avg = isA ? m.avgA : m.avgB;
        if (co !== null && co !== undefined && co !== "" && !isNaN(co)) { const n = Number(co); if (maxCheckout === null || n > maxCheckout) maxCheckout = n; }
        if (avg !== null && avg !== undefined && avg !== "" && !isNaN(avg)) { avgSum += Number(avg); avgCount++; }
      });
    return { played, wins, losses, legsFor, legsAgainst, headToHead, maxCheckout, avgAverage: avgCount ? avgSum / avgCount : null };
  }

  function resizeImageFile(file, size, quality) {
    size = size || 240; quality = quality || 0.82;
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onerror = () => reject(new Error("Datei konnte nicht gelesen werden"));
      reader.onload = (e) => {
        const img = new Image();
        img.onerror = () => reject(new Error("Bild konnte nicht gelesen werden"));
        img.onload = () => {
          const canvas = document.createElement("canvas");
          canvas.width = size; canvas.height = size;
          const ctx = canvas.getContext("2d");
          const scale = Math.max(size / img.width, size / img.height);
          const w = img.width * scale, h = img.height * scale;
          ctx.drawImage(img, (size - w) / 2, (size - h) / 2, w, h);
          resolve(canvas.toDataURL("image/jpeg", quality));
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    });
  }

    state.tournamentWizardStep = "players";
    render();
  };
  window.backToTournamentNameStep = function () { state.tournamentWizardStep = "name"; render(); };
  window.toggleTournamentPlayer = function (id) {
    const i = state.tournamentWizardPlayerIds.indexOf(id);
    if (i === -1) state.tournamentWizardPlayerIds.push(id); else state.tournamentWizardPlayerIds.splice(i, 1);
    render();
  };
  window.confirmCreateTournament = function () {
    const ids = state.tournamentWizardPlayerIds;
    if (ids.length < 2 || !db) return;
    const round1 = buildFirstRound(ids);
    // If a round happens to be fully decided by byes, roll forward until a real match is pending.
    let advanced = advanceTournament([round1]);
    while (advanced.status === "laufend" && advanced.rounds[advanced.rounds.length - 1].matches.every((m) => m.status === "beendet")) {
      advanced = advanceTournament(advanced.rounds);
    }
    db.collection("tournaments").add({
      name: state.tournamentWizardName.trim(),
      createdAt: firebase.firestore.FieldValue.serverTimestamp(),
      status: advanced.status,
      playerIds: ids,
      rounds: advanced.rounds,
      winnerId: advanced.winnerId,
    }).then((ref) => {
      state.modal = null;
      state.tournamentDetailId = ref.id;
      render();
    }).catch((e) => { state.saveError = "Turnier konnte nicht erstellt werden: " + e.message; render(); });
  };

  window.openTournamentDetail = function (id) { state.tournamentDetailId = id; render(); };
  window.closeTournamentDetail = function () { state.tournamentDetailId = null; render(); };

  function tournamentMatchAt(t, roundIndex, matchId) {
    const r = t.rounds[roundIndex];
    if (!r) return null;
    return r.matches.find((x) => x.id === matchId) || null;
  }
  function openTournamentResultActual(roundIndex, matchId) {
    const t = state.tournaments.find((x) => x.id === state.tournamentDetailId);
    if (!t) return;
    const m = tournamentMatchAt(t, roundIndex, matchId);
    if (!m) return;
    state.activeRoundIndex = roundIndex;
    state.activeTournamentMatchId = matchId;
    state.tournamentResultForm = {
      legsA: m.legsA == null ? 0 : m.legsA, legsB: m.legsB == null ? 0 : m.legsB,
      checkoutA: m.checkoutA != null ? String(m.checkoutA) : "", checkoutB: m.checkoutB != null ? String(m.checkoutB) : "",
      avgA: m.avgA != null ? String(m.avgA) : "", avgB: m.avgB != null ? String(m.avgB) : "",
    };
    state.modal = "tournamentResult";
    render();
  }
  window.openTournamentResult = function (roundIndex, matchId) {
    const t = state.tournaments.find((x) => x.id === state.tournamentDetailId);
    if (!t) return;
    const m = tournamentMatchAt(t, roundIndex, matchId);
    if (!m) return;
    if (m.status === "geplant") { showMatchIntro(m.playerAId, m.playerBId, () => openTournamentResultActual(roundIndex, matchId)); return; }
    openTournamentResultActual(roundIndex, matchId);
  };
  window.setTournamentResultField = function (key, value) {
    state.tournamentResultForm[key] = value;
  };
  window.stepTournamentResult = function (side, delta) {
    const key = side === "a" ? "legsA" : "legsB";
    state.tournamentResultForm[key] = Math.max(0, Math.min(9, state.tournamentResultForm[key] + delta));
    render();
  };
  // Applies a match result and re-advances the bracket. On correction of an already-played match,
  // all downstream rounds are discarded and rebuilt, since the winner may have changed.
  function applyTournamentResult(t, roundIndex, matchId, resultFields) {
    const rounds = JSON.parse(JSON.stringify(t.rounds)).slice(0, roundIndex + 1);
    const match = rounds[roundIndex].matches.find((x) => x.id === matchId);
    if (!match) return;
    Object.assign(match, resultFields);
    match.status = "beendet";
    match.winnerId = resultFields.legsA > resultFields.legsB ? match.playerAId : match.playerBId;
    let updated = advanceTournament(rounds);
    while (updated.status === "laufend" && updated.rounds[updated.rounds.length - 1].matches.every((m) => m.status === "beendet")) {
      updated = advanceTournament(updated.rounds);
    }
    const payload = { rounds: updated.rounds, status: updated.status, winnerId: updated.winnerId };
    if (updated.status === "beendet") { payload.archivedAt = firebase.firestore.FieldValue.serverTimestamp(); }
    db.collection("tournaments").doc(t.id).update(payload)
      .then(() => {
        state.toast = updated.status === "beendet" ? "Turnier beendet – Sieger steht fest!" : "Ergebnis gespeichert";
        render();
        setTimeout(() => { state.toast = ""; render(); }, 2600);
      })
      .catch((e) => { state.saveError = "Ergebnis konnte nicht gespeichert werden: " + e.message; render(); });
  }
  window.confirmTournamentResult = function () {
    const f = state.tournamentResultForm;
    if (f.legsA === f.legsB || !db) return;
    playConfirmSound();
    const t = state.tournaments.find((x) => x.id === state.tournamentDetailId);
    if (!t) return;
    applyTournamentResult(t, state.activeRoundIndex, state.activeTournamentMatchId, {
      legsA: f.legsA, legsB: f.legsB,
      checkoutA: f.checkoutA === "" ? null : Number(f.checkoutA),
      checkoutB: f.checkoutB === "" ? null : Number(f.checkoutB),
      avgA: f.avgA === "" ? null : Number(f.avgA),
      avgB: f.avgB === "" ? null : Number(f.avgB),
    });
    state.modal = null;
    render();
  };
  window.openDeleteTournament = function (id) { state.deleteTournamentId = id; state.modal = "confirmDeleteTournament"; render(); };
  window.confirmDeleteTournament = function () {
    if (!db || !state.deleteTournamentId) return;
    const id = state.deleteTournamentId;
    db.collection("tournaments").doc(id).delete().then(() => {
      state.modal = null;
      state.deleteTournamentId = null;
      state.tournamentDetailId = null;
      render();
    }).catch((e) => { state.saveError = "Turnier konnte nicht gelöscht werden: " + e.message; render(); });
  };

  window.openConfirmKoPhase = function () { state.modal = "confirmKo"; render(); };
  window.confirmStartKoPhase = function () {
    if (!db) return;
    const lg = activeLeague();
    if (!lg) return;
    const standings = computeStandings("gesamt");
    if (standings.length !== 8) return;
    const leagueMatches = matchesForLeague(lg.id);
    const openMatches = leagueMatches.filter((m) => m.status === "geplant").length;
    if (openMatches > 0 || leagueMatches.length === 0) return;
    const koData = buildKoPhase(standings);
    koData.leagueId = lg.id;
    db.collection("koPhase").doc(lg.id).set(koData)
      .then(() => { state.modal = null; render(); })
      .catch((e) => { state.saveError = "KO-Phase konnte nicht gestartet werden: " + e.message; render(); });
  };

  function openKoResultActual(roundIndex, matchId) {
    const t = currentKoPhase();
    if (!t) return;
    const m = t.rounds[roundIndex].matches.find((x) => x.id === matchId);
    if (!m) return;
    state.activeKoRoundIndex = roundIndex;
    state.activeKoMatchId = matchId;
    state.koResultForm = { legsA: m.legsA == null ? 0 : m.legsA, legsB: m.legsB == null ? 0 : m.legsB };
    state.modal = "koResult";
    render();
  }
  window.openKoResult = function (roundIndex, matchId) {
    const t = currentKoPhase();
    if (!t) return;
    const m = t.rounds[roundIndex].matches.find((x) => x.id === matchId);
    if (!m) return;
    if (m.status === "geplant") { showMatchIntro(m.playerAId, m.playerBId, () => openKoResultActual(roundIndex, matchId)); return; }
    openKoResultActual(roundIndex, matchId);
  };
  window.stepKoResult = function (side, delta) {
    const key = side === "a" ? "legsA" : "legsB";
    state.koResultForm[key] = Math.max(0, Math.min(9, state.koResultForm[key] + delta));
    render();
  };
  window.confirmKoResult = function () {
    const f = state.koResultForm;
    if (f.legsA === f.legsB || !db) return;
    playConfirmSound();
    const t = currentKoPhase();
    if (!t) return;
    const rounds = JSON.parse(JSON.stringify(t.rounds));
    const round = rounds[state.activeKoRoundIndex];
    const match = round.matches.find((x) => x.id === state.activeKoMatchId);
    match.legsA = f.legsA; match.legsB = f.legsB; match.status = "beendet";
    match.winnerId = f.legsA > f.legsB ? match.playerAId : match.playerBId;
    const updated = advanceKoPhase({ seeds: t.seeds, rounds });
    db.collection("koPhase").doc(t.id).update(updated)
      .then(() => {
        state.toast = updated.status === "beendet" ? "KO-Phase beendet – Sieger steht fest!" : "Ergebnis gespeichert";
        render();
        setTimeout(() => { state.toast = ""; render(); }, 2600);
      })
      .catch((e) => { state.saveError = "Ergebnis konnte nicht gespeichert werden: " + e.message; render(); });
    state.modal = null;
    render();
  };

  window.deleteKoMatch = function (roundIndex, matchId) {
    const armKey = roundIndex + ":" + matchId;
    if (state.confirmDeleteKoMatchKey !== armKey) {
      state.confirmDeleteKoMatchKey = armKey;
      render();
      setTimeout(() => { if (state.confirmDeleteKoMatchKey === armKey) { state.confirmDeleteKoMatchKey = null; render(); } }, 3000);
      return;
    }
    state.confirmDeleteKoMatchKey = null;
    if (!db) return;
    const t = currentKoPhase();
    if (!t) return;
    let rounds;
    if (roundIndex === 0) {
      rounds = JSON.parse(JSON.stringify(t.rounds)).slice(0, 1);
      const match = rounds[0].matches.find((x) => x.id === matchId);
      if (match) { match.status = "geplant"; match.legsA = null; match.legsB = null; match.winnerId = null; }
    } else {
      rounds = JSON.parse(JSON.stringify(t.rounds)).slice(0, roundIndex);
    }
    db.collection("koPhase").doc(t.id).update({ rounds: rounds, status: "laufend", winnerId: null })
      .then(() => {
        state.toast = "Ein Schritt zurückgesetzt";
        render();
        setTimeout(() => { state.toast = ""; render(); }, 2400);
      })
      .catch((e) => { state.saveError = "Zurücksetzen fehlgeschlagen: " + e.message; render(); });
  };

  /* ---------------- Render ---------------- */
  function render() {
    const app = document.getElementById("app");
    if (state.connError) { app.innerHTML = renderConnError(); return; }
    if (!IS_CONFIGURED) { app.innerHTML = renderSetup(); return; }
    if (!state.splashElapsed) {
      if (!state.splashRenderedOnce) { app.innerHTML = renderSplash(); state.splashRenderedOnce = true; }
      return;
    }
    if (!state.playersReady || !state.matchesReady || !state.tournamentsReady || !state.koPhaseReady || !state.leaguesReady) { app.innerHTML = renderLoading(); return; }
    app.innerHTML = renderApp();
    const photoInputs = app.querySelectorAll("[data-photo-input]");
    photoInputs.forEach((el) => { el.onchange = () => window.handlePhotoSelect(el.getAttribute("data-photo-input"), el); });
  }

    return `<div class="row between" style="padding:24px 20px 16px;border-bottom:1px solid var(--panel-border);">
      <div class="row" style="gap:10px;min-width:0;">
        <div style="background:var(--bg-soft);border:1.5px solid var(--gold);border-radius:12px;padding:2px;width:44px;height:44px;display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0;"><img src="${LOGO_DATA_URI}" alt="Saffer's Dartsliga" style="width:100%;height:100%;object-fit:cover;border-radius:9px;"></div>
        <div style="min-width:0;">
          <div class="display" style="font-size:18px;font-weight:600;line-height:1;color:var(--blue);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">Saffer's Dartsliga</div>
          <div style="color:var(--blue);font-size:12px;font-weight:600;margin-top:4px;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${esc(lg ? lg.name : "Liga wählen")}</div>
        </div>
      </div>
      <button class="press row" style="gap:5px;background:var(--panel);border-radius:9999px;padding:7px 12px;flex-shrink:0;" onclick="${state.isAdmin ? "lockAdmin()" : "openAdminLogin()"}">
        ${state.isAdmin ? iconUnlock(14, "var(--gold)") : iconLock(14, "var(--muted)")}
        ${state.isAdmin ? `<span style="font-size:11px;font-weight:600;color:var(--gold);">Admin</span>` : ""}
      </button>
    </div>`;
  }

  function renderBottomNav() {
    function navBtn(tab, label, iconHtml) {
      const active = state.tab === tab;
      return `<button class="press nav-btn" onclick="setTab('${tab}')">
        ${iconHtml(19, active ? "var(--gold)" : "var(--muted)")}
        <span style="font-size:9.5px;font-weight:500;color:${active ? "var(--cream)" : "var(--muted)"};white-space:nowrap;">${label}</span>
      </button>`;
    }
    return `<div class="bottom-nav">
      ${navBtn("table", "Tabelle", iconTrophy)}
      ${navBtn("schedule", "Spielplan", iconCalendar)}
      <button class="press nav-btn" onclick="openHome()">
        ${iconHome(19, state.modal === "home" ? "var(--gold)" : "var(--muted)")}
        <span style="font-size:9.5px;font-weight:500;color:${state.modal === "home" ? "var(--cream)" : "var(--muted)"};white-space:nowrap;">Home</span>
      </button>
      ${navBtn("players", "Spieler", iconUsers)}
      ${navBtn("tournament", "Turniermodus", iconBracket)}
    </div>`;
  }

  function renderTableTab() {
    const standings = computeStandings(state.standingsRound);
    const filterRow = `<div class="row" style="gap:6px;margin-bottom:14px;">
      ${[["gesamt", "Gesamt"], ["Hinrunde", "Hinrunde"], ["Rückrunde", "Rückrunde"]].map(([val, label]) =>
        `<button class="press mode-chip ${state.standingsRound === val ? "active" : ""}" onclick="setStandingsRound('${val}')">${label}</button>`
      ).join("")}
    </div>`;
    const koActive = state.standingsRound === "gesamt" && state.players.length === 8;
    const koTint = (i) => {
      if (!koActive) return "";
      const rank = i + 1;
      if (rank <= 2) return "background:rgba(59,122,74,0.22);border-color:rgba(59,122,74,0.55);";
      if (rank >= 7) return "background:rgba(196,18,47,0.16);border-color:rgba(196,18,47,0.45);";
      return "background:rgba(124,145,132,0.14);";
    };
    const legend = koActive ? `<div class="row" style="gap:12px;margin-bottom:12px;flex-wrap:wrap;">
      <span class="row" style="gap:5px;"><span style="width:9px;height:9px;border-radius:9999px;background:var(--green);display:inline-block;"></span><span style="color:var(--muted);font-size:10px;">Halbfinale direkt</span></span>
      <span class="row" style="gap:5px;"><span style="width:9px;height:9px;border-radius:9999px;background:var(--cream-dim);display:inline-block;"></span><span style="color:var(--muted);font-size:10px;">Ausspielung</span></span>
      <span class="row" style="gap:5px;"><span style="width:9px;height:9px;border-radius:9999px;background:var(--red);display:inline-block;"></span><span style="color:var(--muted);font-size:10px;">Ausgeschieden</span></span>
    </div>` : "";
    if (standings.length === 0) {
      return filterRow + emptyState(iconTrophy(28, "var(--muted)"), "Noch keine Tabelle", "Legt zuerst Spieler an und tragt Ergebnisse ein — die Tabelle füllt sich automatisch.");
    }
    return filterRow + legend + `<div class="col" style="gap:8px;">
      ${standings.map((s, i) => {
        const diff = s.legsFor - s.legsAgainst;
        return `<div class="card row press" style="gap:12px;padding:12px 14px;${koTint(i)}" onclick="openPlayerDetail('${s.player.id}')">
          <div class="mono" style="width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:13px;${rankBadge(i)}">${i + 1}</div>
          ${avatarHTML(s.player, 34)}
          <div style="flex:1;min-width:0;">
            <div style="font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${esc(s.player.name)}</div>
            <div class="mono" style="color:var(--muted);font-size:11px;margin-top:2px;">${s.played} Sp · ${s.wins}S–${s.losses}N · Legs ${s.legsFor}:${s.legsAgainst}</div>
          </div>
          <div style="text-align:right;flex-shrink:0;">
            <div class="display" style="color:var(--gold);font-size:20px;font-weight:600;line-height:1;">${s.points}</div>
            <div style="color:var(--muted);font-size:10px;margin-top:4px;">Pkt</div>
          </div>
        </div>`;
      }).join("")}
    </div>
    ${renderKoPhaseSection()}`;
  }

  function koMatchCardHTML(m, roundIndex) {
    const isDone = m.status === "beendet";
    const aWon = isDone && m.legsA > m.legsB;
    const bWon = isDone && m.legsB > m.legsA;
    const showResultBtn = !isDone || state.isAdmin;
    return `<div class="card" style="padding:12px 14px;">
      <div class="row" style="gap:8px;">
        <span style="flex:1;min-width:0;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:${aWon ? 600 : 500};color:${aWon ? "var(--gold)" : "var(--cream)"}">${esc(playerName(m.playerAId))}</span>
        ${isDone
          ? `<span class="mono" style="font-size:14px;font-weight:700;padding:0 8px;flex-shrink:0;">${m.legsA}–${m.legsB}</span>`
          : `<span style="color:var(--muted);font-size:12px;padding:0 8px;flex-shrink:0;">vs</span>`}
        <span style="flex:1;min-width:0;font-size:14px;text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:${bWon ? 600 : 500};color:${bWon ? "var(--gold)" : "var(--cream)"}">${esc(playerName(m.playerBId))}</span>
      </div>
      ${showResultBtn || state.isAdmin ? `<div class="row" style="gap:6px;margin-top:8px;justify-content:center;">
        ${showResultBtn ? `<button class="press row" style="gap:4px;border-radius:8px;padding:4px 10px;font-size:11px;font-weight:500;background:${isDone ? "transparent" : "var(--gold)"};color:${isDone ? "var(--muted)" : "#241C05"};display:inline-flex;" onclick="openKoResult(${roundIndex},'${m.id}')">
          ${isDone ? iconPencil(12, "var(--muted)") : iconTarget(12, "#241C05")} ${isDone ? "Bearbeiten" : "Ergebnis"}
        </button>` : ""}
        ${state.isAdmin && isDone ? `<button class="press icon-btn" style="background:${state.confirmDeleteKoMatchKey === (roundIndex + ":" + m.id) ? "var(--red)" : "var(--bg-soft)"};" onclick="deleteKoMatch(${roundIndex},'${m.id}')">${iconTrash(13, state.confirmDeleteKoMatchKey === (roundIndex + ":" + m.id) ? "#fff" : "var(--muted)")}</button>` : ""}
      </div>` : ""}
    </div>`;
  }

  function koBracketConnector() {
    return `<div style="display:flex;justify-content:center;height:18px;position:relative;margin:0 26px;">
      <div style="position:absolute;left:0;top:0;width:50%;height:18px;border-top:2px solid var(--panel-border);border-right:2px solid var(--panel-border);border-top-right-radius:10px;"></div>
      <div style="position:absolute;right:0;top:0;width:50%;height:18px;border-top:2px solid var(--panel-border);border-left:2px solid var(--panel-border);border-top-left-radius:10px;"></div>
    </div>`;
  }

  function koBracketFunnel() {
    return `<div style="display:flex;flex-direction:column;align-items:center;margin-bottom:2px;">
      <svg width="150" height="52" viewBox="0 0 150 52">
        <path d="M6,4 L144,4 L102,46 L48,46 Z" fill="none" stroke="var(--panel-border)" stroke-width="2"/>
        <text x="75" y="29" text-anchor="middle" fill="var(--cream-dim)" font-size="12" font-family="Oswald, sans-serif" font-weight="600" letter-spacing="1">TABELLE</text>
      </svg>
    </div>`;
  }

  function renderKoBracket(koPhase, readOnly) {
    const rounds = koPhase.rounds;
    const row = (matches, idx) => `<div class="row" style="gap:10px;align-items:stretch;">
      ${matches.map((m) => `<div style="flex:1;min-width:0;">${readOnly ? historyMatchRowHTML(m) : koMatchCardHTML(m, idx)}</div>`).join("")}
    </div>`;
    let html = row(rounds[0].matches, 0);
    if (rounds[1]) { html += koBracketConnector(); html += row(rounds[1].matches, 1); }
    if (rounds[2]) { html += koBracketConnector(); html += `<div style="max-width:calc(50% - 5px);margin:0 auto;">${readOnly ? historyMatchRowHTML(rounds[2].matches[0]) : koMatchCardHTML(rounds[2].matches[0], 2)}</div>`; }
    return html;
  }

  function renderKoPhaseSection() {
    if (state.standingsRound !== "gesamt") return "";
    const eightPlayers = state.players.length === 8;
    const koPhase = currentKoPhase();
    const lg = activeLeague();
    const leagueMatches = lg ? matchesForLeague(lg.id) : [];

    if (!koPhase) {
      if (!eightPlayers) {
        return `<div style="color:var(--muted);font-size:11px;text-align:center;margin-top:18px;">Die KO-Phase ist für genau 8 Liga-Spieler ausgelegt (aktuell ${state.players.length}).</div>`;
      }
      if (!state.isAdmin) return "";
      const openMatches = leagueMatches.filter((m) => m.status === "geplant").length;
      const canStart = openMatches === 0 && leagueMatches.length > 0;
      return `
        <button class="press ${canStart ? "btn-gold" : "btn-panel"} row center" style="width:100%;gap:6px;padding:12px;font-size:14px;margin-top:18px;${canStart ? "" : "opacity:.4;pointer-events:none;"}" onclick="openConfirmKoPhase()">
          ${iconBracket(16, canStart ? "#241C05" : "var(--muted)")} KO-Phase starten
        </button>
        ${!canStart ? `<div style="color:var(--muted);font-size:11px;text-align:center;margin-top:8px;">Erst möglich, wenn alle Spiele im Spielplan abgeschlossen sind${openMatches > 0 ? ` (noch ${openMatches} offen)` : ""}.</div>` : ""}
      `;
    }

    return `
      <div style="margin-top:24px;">
        <div class="display" style="font-size:16px;font-weight:600;margin-bottom:12px;">🏆 KO-Phase</div>
        ${koPhase.status === "beendet" ? `<div class="card" style="text-align:center;padding:16px;margin-bottom:16px;border-color:var(--gold);"><div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px;">KO-Phase Sieger</div><div class="display" style="font-size:20px;font-weight:600;color:var(--gold);">🏆 ${esc(playerName(koPhase.winnerId))}</div></div>` : ""}
        ${renderKoBracket(koPhase, false)}
      </div>
    `;
  }

  function matchCardHTML(m) {
    const isDone = m.status === "beendet";
    const aWon = isDone && m.legsA > m.legsB;
    const bWon = isDone && m.legsB > m.legsA;
    const round = m.round || "Hinrunde";
    const dateStr = m.date ? new Date(m.date).toLocaleDateString("de-DE", { day: "2-digit", month: "2-digit" }) : "Datum offen";
    const showResultBtn = !isDone || state.isAdmin;
    const hasExtra = isDone && (m.checkoutA != null || m.checkoutB != null || m.avgA != null || m.avgB != null);
    return `<div class="card" style="padding:12px 14px;">
      <div style="margin-bottom:8px;">
        <span style="font-size:10px;font-weight:600;color:var(--muted);background:var(--bg-soft);border-radius:6px;padding:2px 8px;letter-spacing:.03em;">${esc(round)}</span>
      </div>
      <div class="row" style="gap:8px;">
        <span style="flex:1;min-width:0;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:${aWon ? 600 : 500};color:${aWon ? "var(--gold)" : "var(--cream)"}">${esc(playerName(m.playerAId))}</span>
        ${isDone
          ? `<span class="mono" style="font-size:14px;font-weight:700;padding:0 8px;flex-shrink:0;">${m.legsA}–${m.legsB}</span>`
          : `<span style="color:var(--muted);font-size:12px;padding:0 8px;flex-shrink:0;">vs</span>`}
        <span style="flex:1;min-width:0;font-size:14px;text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:${bWon ? 600 : 500};color:${bWon ? "var(--gold)" : "var(--cream)"}">${esc(playerName(m.playerBId))}</span>
      </div>
      ${hasExtra ? `<div class="mono" style="color:var(--muted);font-size:10px;margin-top:6px;text-align:center;">Ø ${m.avgA != null ? m.avgA : "–"} · CO ${m.checkoutA != null ? m.checkoutA : "–"} &nbsp;—&nbsp; Ø ${m.avgB != null ? m.avgB : "–"} · CO ${m.checkoutB != null ? m.checkoutB : "–"}</div>` : ""}
      <div class="row between" style="margin-top:8px;">
        <span style="color:var(--muted);font-size:11px;">${esc(m.mode)} · ${dateStr}</span>
        <div class="row" style="gap:4px;">
          ${!isDone ? `<button class="press row" style="gap:4px;border-radius:8px;padding:4px 10px;font-size:11px;font-weight:500;background:var(--bg-soft);color:var(--cream-dim);border:1px solid var(--panel-border);" onclick="openFullMatch('${m.id}')">
            ${iconBracket(12, "var(--cream-dim)")} Match Start
          </button>` : ""}
          ${showResultBtn ? `<button class="press row" style="gap:4px;border-radius:8px;padding:4px 10px;font-size:11px;font-weight:500;background:${isDone ? "transparent" : "var(--gold)"};color:${isDone ? "var(--muted)" : "#241C05"}" onclick="openResult('${m.id}')">
            ${isDone ? iconPencil(12, "var(--muted)") : iconTarget(12, "#241C05")} ${isDone ? "Bearbeiten" : "Ergebnis"}
          </button>` : ""}
          ${state.isAdmin ? `<button class="press icon-btn" onclick="removeMatch('${m.id}')">${iconTrash(13, "var(--muted)")}</button>` : ""}
        </div>
      </div>
    </div>`;
  }

  function renderScheduleTab() {
    const lg = activeLeague();
    const leagueMatches = lg ? matchesForLeague(lg.id) : [];
    const roundFilter = state.scheduleRoundFilter || "gesamt";
    const playerFilter = state.schedulePlayerFilter || "";
    const passesFilter = (m) => (roundFilter === "gesamt" || (m.round || "Hinrunde") === roundFilter) && (!playerFilter || m.playerAId === playerFilter || m.playerBId === playerFilter);
    const upcoming = leagueMatches.filter((m) => m.status === "geplant" && passesFilter(m));
    const finished = leagueMatches.filter((m) => m.status === "beendet" && passesFilter(m)).slice().reverse();
    const disabled = state.players.length < 2;
    const anyFilterActive = roundFilter !== "gesamt" || !!playerFilter;
    const adminButtons = state.isAdmin ? `
      <div class="row" style="gap:8px;margin-bottom:8px;">
        <button class="press btn-gold row center" style="flex:1;gap:6px;padding:10px;font-size:14px;${disabled ? "opacity:.4;pointer-events:none;" : ""}" onclick="openNewMatch()">${iconPlus(16, "#241C05")} Match</button>
      </div>
      <div class="row" style="gap:8px;margin-bottom:16px;">
        <button class="press btn-panel row center" style="flex:1;gap:6px;padding:9px;font-size:13px;${disabled ? "opacity:.4;pointer-events:none;" : ""}" onclick="openConfirmRR('Hinrunde')">${iconShuffle(14, "var(--cream)")} Hinrunde</button>
        <button class="press btn-panel row center" style="flex:1;gap:6px;padding:9px;font-size:13px;${disabled ? "opacity:.4;pointer-events:none;" : ""}" onclick="openConfirmRR('Rückrunde')">${iconShuffle(14, "var(--cream)")} Rückrunde</button>
      </div>` : "";
    const filterUI = `
      <div class="row" style="gap:6px;margin-bottom:10px;flex-wrap:wrap;">
        ${[["gesamt", "Gesamt"], ["Hinrunde", "Hinrunde"], ["Rückrunde", "Rückrunde"]].map(([val, label]) =>
          `<button class="press mode-chip ${roundFilter === val ? "active" : ""}" onclick="setScheduleRoundFilter('${val}')">${label}</button>`
        ).join("")}
      </div>
      <select class="field-input" style="margin-bottom:18px;" onchange="setSchedulePlayerFilter(this.value)">
        <option value="" ${!playerFilter ? "selected" : ""}>Alle Spieler</option>
        ${state.players.map((p) => `<option value="${p.id}" ${playerFilter === p.id ? "selected" : ""}>${esc(p.name)}</option>`).join("")}
      </select>`;
    return `
      ${adminButtons}
      ${filterUI}
      <div style="color:var(--muted);font-size:12px;font-weight:500;text-transform:uppercase;letter-spacing:.03em;margin-bottom:8px;">Anstehend</div>
      ${upcoming.length === 0
        ? emptyState(iconCalendar(26, "var(--muted)"), "Keine geplanten Matches", anyFilterActive ? "Für diesen Filter gibt es aktuell keine Matches." : (state.isAdmin ? "Leg ein Match an oder erstellt einen Rundenplan für alle Spieler." : "Aktuell sind keine Matches geplant."), true)
        : `<div class="col" style="gap:8px;margin-bottom:24px;">${upcoming.map(matchCardHTML).join("")}</div>`}
      <div style="color:var(--muted);font-size:12px;font-weight:500;text-transform:uppercase;letter-spacing:.03em;margin-bottom:8px;">Gespielt</div>
      ${finished.length === 0
        ? emptyState(iconTarget(26, "var(--muted)"), "Noch keine Ergebnisse", anyFilterActive ? "Für diesen Filter gibt es noch keine Ergebnisse." : "Sobald ein Match beendet ist, taucht es hier auf.", true)
        : `<div class="col" style="gap:8px;">${finished.map(matchCardHTML).join("")}</div>`}
    `;
  }

  function renderPlayersTab() {
    const isAdmin = state.isAdmin;
    return `
      ${isAdmin ? `<div class="row" style="gap:8px;margin-bottom:16px;">
        <input id="new-player-input" class="field-input" placeholder="Name des Spielers" value="${esc(state.newPlayerName)}"
          oninput="setNewPlayerName(this.value)" onkeydown="if(event.key==='Enter'){addPlayer();}">
        <button class="press btn-gold row center" style="padding:0 16px;border-radius:12px;" onclick="addPlayer()">${iconPlus(18, "#241C05")}</button>
      </div>` : ""}
      ${state.players.length === 0
        ? emptyState(iconUsers(28, "var(--muted)"), "Noch keine Spieler", isAdmin ? "Trag oben eure Liga-Mitglieder ein, um loszulegen." : "Der Admin hat noch keine Spieler eingetragen.")
        : `<div class="col" style="gap:8px;">${state.players.map((p) => `
          <div class="card row" style="gap:12px;padding:12px 14px;">
            ${isAdmin ? `<label class="press" style="position:relative;display:block;width:40px;height:40px;flex-shrink:0;cursor:pointer;">
              <input type="file" accept="image/*" data-photo-input="${p.id}" style="display:none;">
              ${avatarHTML(p, 40)}
              <div style="position:absolute;bottom:-2px;right:-2px;border-radius:9999px;padding:4px;display:flex;background:var(--gold);border:2px solid var(--panel);">${iconCamera(9, "#241C05")}</div>
            </label>` : avatarHTML(p, 40)}
            <div style="flex:1;min-width:0;font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${esc(p.name)}</div>
            ${isAdmin ? `<button class="press icon-btn" style="background:${state.confirmDeleteId === p.id ? "var(--red)" : "transparent"};" onclick="deletePlayer('${p.id}')">${iconTrash(16, state.confirmDeleteId === p.id ? "#fff" : "var(--muted)")}</button>` : ""}
          </div>`).join("")}</div>`}
      <div style="color:var(--muted);font-size:11px;margin-top:16px;text-align:center;padding:0 16px;">${isAdmin ? "Diese Liga-Daten sind für alle sichtbar, die diesen Link öffnen." : "Nur der Liga-Admin kann Spieler verwalten."}</div>
    `;
  }

  function tournamentCardHTML(t) {
    const winner = t.winnerId ? playerName(t.winnerId) : null;
    const roundCount = t.rounds ? t.rounds.length : 0;
    const isDone = t.status === "beendet";
    return `<div class="card press" style="padding:14px;" onclick="openTournamentDetail('${t.id}')">
      <div class="row between">
        <span style="font-size:15px;font-weight:600;">${esc(t.name)}</span>
        <span style="font-size:10px;font-weight:600;padding:3px 9px;border-radius:9999px;background:${isDone ? "var(--gold)" : "var(--bg-soft)"};color:${isDone ? "#241C05" : "var(--muted)"};flex-shrink:0;">${isDone ? "Beendet" : "Läuft"}</span>
      </div>
      <div style="color:var(--muted);font-size:12px;margin-top:6px;">${(t.playerIds || []).length} Spieler · ${roundCount} Runde${roundCount === 1 ? "" : "n"}</div>
      ${winner ? `<div class="mono" style="color:var(--gold);font-size:13px;margin-top:8px;">🏆 ${esc(winner)}</div>` : ""}
    </div>`;
  }

  function renderTournamentTab() {
    if (state.tournamentDetailId) return renderTournamentDetail();
    const running = state.tournaments.filter((t) => t.status !== "beendet");
    const finished = state.tournaments.filter((t) => t.status === "beendet")
      .slice().sort((a, b) => tsVal(b.archivedAt) - tsVal(a.archivedAt));
    return `
      ${state.isAdmin ? `<button class="press btn-gold row center" style="width:100%;gap:6px;padding:10px;font-size:14px;margin-bottom:16px;" onclick="openNewTournament()">${iconPlus(16, "#241C05")} Neues Turnier</button>` : ""}
      ${running.length === 0 && finished.length === 0
        ? emptyState(iconBracket(28, "var(--muted)"), "Noch keine Turniere", state.isAdmin ? "Starte euer erstes Turnier mit dem Button oben." : "Der Admin hat noch kein Turnier gestartet.")
        : ""}
      ${running.length > 0 ? `<div class="col" style="gap:8px;">${running.map(tournamentCardHTML).join("")}</div>` : ""}
      ${finished.length > 0 ? `
        <div style="color:var(--muted);font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.03em;margin:${running.length > 0 ? "22px" : "0"} 0 8px;">Gespielte Turniere</div>
        <div class="col" style="gap:8px;">${finished.map(tournamentCardHTML).join("")}</div>
      ` : ""}
    `;
  }

  function tournamentMatchCardHTML(m, roundIndex) {
    const isBye = m.playerBId === null || m.playerBId === undefined;
    const isDone = m.status === "beendet";
    const aWon = isDone && !isBye && m.legsA > m.legsB;
    const bWon = isDone && !isBye && m.legsB > m.legsA;
    const showResultBtn = !isBye && (!isDone || state.isAdmin);
    const hasExtra = isDone && !isBye && (m.checkoutA != null || m.checkoutB != null || m.avgA != null || m.avgB != null);
    return `<div class="card" style="padding:12px 14px;">
      <div class="row" style="gap:8px;">
        <span style="flex:1;min-width:0;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:${aWon ? 600 : 500};color:${aWon ? "var(--gold)" : "var(--cream)"}">${esc(playerName(m.playerAId))}</span>
        ${isBye
          ? `<span style="color:var(--muted);font-size:11px;padding:0 8px;flex-shrink:0;">Freilos</span>`
          : isDone
            ? `<span class="mono" style="font-size:14px;font-weight:700;padding:0 8px;flex-shrink:0;">${m.legsA}–${m.legsB}</span>`
            : `<span style="color:var(--muted);font-size:12px;padding:0 8px;flex-shrink:0;">vs</span>`}
        <span style="flex:1;min-width:0;font-size:14px;text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:${bWon ? 600 : 500};color:${bWon ? "var(--gold)" : "var(--cream)"}">${isBye ? "" : esc(playerName(m.playerBId))}</span>
      </div>
      ${hasExtra ? `<div class="mono" style="color:var(--muted);font-size:10px;margin-top:6px;text-align:center;">Ø ${m.avgA != null ? m.avgA : "–"} · CO ${m.checkoutA != null ? m.checkoutA : "–"} &nbsp;—&nbsp; Ø ${m.avgB != null ? m.avgB : "–"} · CO ${m.checkoutB != null ? m.checkoutB : "–"}</div>` : ""}
      ${showResultBtn ? `<div class="row" style="gap:6px;margin-top:8px;justify-content:flex-end;">
        ${!isDone ? `<button class="press row" style="gap:4px;border-radius:8px;padding:4px 10px;font-size:11px;font-weight:500;background:var(--bg-soft);color:var(--cream-dim);border:1px solid var(--panel-border);" onclick="openTournamentFullMatch(${roundIndex},'${m.id}')">
          ${iconBracket(12, "var(--cream-dim)")} Match Start
        </button>` : ""}
        <button class="press row" style="gap:4px;border-radius:8px;padding:4px 10px;font-size:11px;font-weight:500;background:${isDone ? "transparent" : "var(--gold)"};color:${isDone ? "var(--muted)" : "#241C05"};display:inline-flex;" onclick="openTournamentResult(${roundIndex},'${m.id}')">
          ${isDone ? iconPencil(12, "var(--muted)") : iconTarget(12, "#241C05")} ${isDone ? "Bearbeiten" : "Ergebnis"}
        </button>
      </div>` : ""}
    </div>`;
  }

  // Best checkout & best average across every match of a tournament, each with the player who threw it.
  function tournamentStatLeaders(t) {
    let bestCO = null, bestCOplayer = null, bestAvg = null, bestAvgPlayer = null;
    (t.rounds || []).forEach((round) => {
      round.matches.forEach((m) => {
        [["A", m.playerAId], ["B", m.playerBId]].forEach(([side, pid]) => {
          if (!pid) return;
          const co = m["checkout" + side];
          const avg = m["avg" + side];
          if (co != null && (bestCO === null || co > bestCO)) { bestCO = co; bestCOplayer = pid; }
          if (avg != null && (bestAvg === null || avg > bestAvg)) { bestAvg = avg; bestAvgPlayer = pid; }
        });
      });
    });
    return { bestCO, bestCOplayer, bestAvg, bestAvgPlayer };
  }

  function playerById(id) {
    return state.players.find((p) => p.id === id) || { id, name: playerName(id), photo: null };
  }

  function renderTournamentWinnerScreen(t) {
    const champ = playerById(t.winnerId);
    const { bestCO, bestCOplayer, bestAvg, bestAvgPlayer } = tournamentStatLeaders(t);
    const statBlock = (label, valueHtml, player) => `
      <div class="card" style="text-align:center;padding:18px 16px;border-color:var(--gold);background:rgba(203,161,53,0.08);">
        <div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:12px;">${label}</div>
        <div style="display:flex;justify-content:center;">${avatarHTML(player, 84)}</div>
        <div class="display" style="font-size:16px;font-weight:600;color:var(--cream);margin-top:12px;">${esc(player.name)}</div>
        <div class="display mono" style="font-size:24px;font-weight:700;color:var(--gold);margin-top:2px;">${valueHtml}</div>
      </div>`;
    return `
      <button class="press row" style="gap:4px;margin-bottom:14px;background:transparent;color:var(--muted);font-size:13px;padding:0;" onclick="closeTournamentDetail()">${iconChevronLeft(14, "var(--muted)")} Zurück zu Turnieren</button>
      <div class="display" style="font-size:18px;font-weight:600;margin-bottom:14px;">${esc(t.name)}</div>
      <div class="card" style="text-align:center;padding:26px 16px;margin-bottom:14px;border-color:var(--gold);background:rgba(203,161,53,0.12);">
        <div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:16px;">🏆 Herzlichen Glückwunsch zum Sieg</div>
        <div style="display:flex;justify-content:center;">${avatarHTML(champ, 140)}</div>
        <div class="display" style="font-size:24px;font-weight:600;color:var(--gold);margin-top:16px;">${esc(champ.name)}</div>
        <div style="color:var(--cream-dim);font-size:12px;margin-top:4px;">Turniersieger · ${esc(t.name)}</div>
      </div>
      <div class="col" style="gap:12px;margin-bottom:18px;">
        ${bestCOplayer ? statBlock("Höchster Checkout", String(bestCO), playerById(bestCOplayer)) : ""}
        ${bestAvgPlayer ? statBlock("Höchster Average", Number(bestAvg).toFixed(2), playerById(bestAvgPlayer)) : ""}
      </div>
      <div style="color:var(--muted);font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.03em;margin-bottom:8px;">Turnierbaum</div>
      ${(t.rounds || []).map((round, idx) => `
        <div style="color:var(--muted);font-size:12px;font-weight:500;text-transform:uppercase;letter-spacing:.03em;margin:${idx === 0 ? "0" : "18px"} 0 8px;">${roundLabel(round.matches.length, idx)}</div>

    `;
  }

  function renderTournamentDetail() {
    const t = state.tournaments.find((x) => x.id === state.tournamentDetailId);
    if (!t) { state.tournamentDetailId = null; return renderTournamentTab(); }
    if (t.status === "beendet" && t.winnerId) return renderTournamentWinnerScreen(t);
    const rounds = t.rounds || [];
    return `
      <button class="press row" style="gap:4px;margin-bottom:14px;background:transparent;color:var(--muted);font-size:13px;padding:0;" onclick="closeTournamentDetail()">${iconChevronLeft(14, "var(--muted)")} Zurück zu Turnieren</button>
      <div class="display" style="font-size:18px;font-weight:600;margin-bottom:12px;">${esc(t.name)}</div>
      ${rounds.map((round, idx) => `

  }

    return `<div class="modal-overlay" onclick="closeModal()">
      <div class="modal-panel" onclick="event.stopPropagation()">

    if (state.modal === "newMatch") return renderNewMatchModal();

    if (state.modal === "confirmArchiveLeague") return renderConfirmArchiveLeagueModal();

          <div class="mono" style="color:var(--muted);font-size:12px;margin-top:2px;">${d.played} Sp · ${d.wins}S–${d.losses}N · Legs ${d.legsFor}:${d.legsAgainst}</div>

      </div>`;
    return `<div class="modal-overlay">
      <div class="modal-panel" onclick="event.stopPropagation()">
        <div class="row between" style="margin-bottom:10px;">
          <span class="display" style="font-size:16px;font-weight:600;">Match Start</span>
          <button class="press icon-btn" style="background:${state.confirmCancelFullArmed ? "var(--red)" : "var(--bg-soft)"};border-radius:9999px;" onclick="cancelFullMatch()">${iconX(16, state.confirmCancelFullArmed ? "#fff" : "var(--muted)")}</button>
        </div>
        ${legsRow}
        <div class="row" style="gap:8px;">
          ${playerBox(a.name, fm.leg.remaining.a, isAThrower)}
          ${playerBox(b.name, fm.leg.remaining.b, !isAThrower)}
        </div>
        ${turnsList}
        ${dartsPrompt}
        ${inputArea}
        <div class="row" style="gap:8px;margin-top:14px;">
          <button class="press btn-soft" style="flex:1;padding:10px;font-size:13px;font-weight:500;${fm.leg.turns.length === 0 || fm.awaitingDarts ? "opacity:.4;pointer-events:none;" : ""}" onclick="undoFullTurn()">${iconChevronLeft(12, "var(--muted)")} Rückgängig</button>
        </div>
        ${state.confirmCancelFullArmed ? `<div style="color:var(--red);font-size:11px;text-align:center;margin-top:8px;">Nochmal tippen zum Abbrechen – Fortschritt geht verloren</div>` : ""}
      </div>
    </div>`;
  }

  render();
  setTimeout(() => { state.splashElapsed = true; render(); }, 3800);
</script>
</body>
</html>
