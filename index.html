  #app { position:relative; z-index:1; }
  button, input, select { font-family:inherit; }
  button { border:none; cursor:pointer; -webkit-appearance:none; appearance:none; }

  .press:active { transform:scale(0.96); }
  .fade-in { animation:fadeIn .25s ease; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:translateY(0)} }
  @keyframes spin { to { transform:rotate(360deg); } }
  .spin { animation:spin 1s linear infinite; }
  .display { font-family:'Oswald',sans-serif; }
  .mono { font-family:'JetBrains Mono',monospace; }

  .between { justify-content:space-between; }
  .center { justify-content:center; }
  .col { display:flex; flex-direction:column; }
  .card { background:rgba(22,40,29,0.66); backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px); border:1px solid var(--panel-border); border-radius:16px; padding:14px; }
  .hidden { display:none !important; }
  .avatar { border-radius:9999px; object-fit:cover; flex-shrink:0; color:#fff; display:flex; align-items:center; justify-content:center; font-weight:600; }
  .btn-gold { background:var(--gold); color:#241C05; font-weight:600; border-radius:12px; }
  .btn-panel { background:var(--panel); color:var(--cream); border:1px solid var(--panel-border); border-radius:12px; }
  .btn-soft { background:var(--bg-soft); color:var(--cream-dim); border-radius:12px; }
  .field-input { width:100%; background:rgba(18,35,24,0.85); color:var(--cream); border:1px solid var(--panel-border); border-radius:12px; padding:10px 14px; font-size:14px; outline:none; }
  .icon-btn { border-radius:10px; padding:6px; background:transparent; }
  .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.6); display:flex; align-items:center; justify-content:center; z-index:50; padding:20px; }
  .modal-panel { width:100%; max-width:420px; background:rgba(22,40,29,0.94); backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px); border:1px solid var(--panel-border); border-radius:24px; padding:20px; padding-bottom:24px; max-height:85vh; overflow-y:auto; }
  .bottom-nav { position:fixed; bottom:0; left:0; right:0; background:rgba(18,35,24,0.82); backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px); border-top:1px solid var(--panel-border); display:flex; align-items:center; justify-content:space-around; padding:10px 0; z-index:40; }
  .nav-btn { display:flex; flex-direction:column; align-items:center; gap:4px; background:transparent; padding:4px 8px; flex:1; min-width:0; }
  .mode-chip { border-radius:10px; padding:6px 12px; font-size:12px; font-weight:500; background:var(--bg-soft); color:var(--cream-dim); }
  .mode-chip.active { background:var(--gold); color:#241C05; }

  function genId() {
    if (typeof crypto !== "undefined" && crypto.randomUUID) return crypto.randomUUID();
    return "id_" + Date.now().toString(36) + "_" + Math.random().toString(36).slice(2, 8);

  function tsVal(ts) { return ts && ts.seconds ? ts.seconds : 0; }
  function activeLeague() { return state.leagues.find((l) => l.status === "aktiv") || null; }
  function bootstrapLeagueId() {
    if (!state.leagues.length) return null;
    const sorted = state.leagues.slice().sort((a, b) => tsVal(a.createdAt) - tsVal(b.createdAt));
    return sorted[0].id;
  }
  function leagueIdForMatch(m) { return m.leagueId || bootstrapLeagueId(); }
  function matchesForLeague(leagueId) { return state.matches.filter((m) => leagueIdForMatch(m) === leagueId); }
  function currentKoPhase() {
    const lg = activeLeague();

  function esc(s) {
    return String(s == null ? "" : s).replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));

  function initials(name) {
    const parts = String(name).trim().split(/\s+/);
    if (parts.length === 1) return parts[0].slice(0, 2).toUpperCase();
    return (parts[0][0] + parts[parts.length - 1][0]).toUpperCase();
  }

  function avatarColor(id) {
    let hash = 0;
    for (let i = 0; i < id.length; i++) hash = (hash * 31 + id.charCodeAt(i)) >>> 0;
    return AVATAR_PALETTE[hash % AVATAR_PALETTE.length];
  }

      return `<img class="avatar" src="${player.photo}" alt="${esc(player.name)}" style="width:${size}px;height:${size}px;">`;

    return `<div class="avatar" style="width:${size}px;height:${size}px;font-size:${Math.round(size * 0.36)}px;background:${avatarColor(player.id)}">${esc(initials(player.name))}</div>`;
  }

  function playerName(id) {
    const p = state.players.find((x) => x.id === id);
    return p ? p.name : "?";
  }

  function shuffleArr(arr) {
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      const tmp = a[i]; a[i] = a[j]; a[j] = tmp;
    }
    return a;
  }

  function nextPowerOf2(n) {
    let p = 1;
    while (p < n) p *= 2;
    return p;
  }

  function buildFirstRound(playerIds) {
    const shuffled = shuffleArr(playerIds);
    const bracketSize = nextPowerOf2(shuffled.length);
    const numPairs = bracketSize / 2;
    const byesNeeded = bracketSize - shuffled.length;
    const pairIndices = shuffleArr(Array.from({ length: numPairs }, (_, i) => i));
    const byePairSet = new Set(pairIndices.slice(0, byesNeeded));
    let ptr = 0;
    const matches = [];
    for (let p = 0; p < numPairs; p++) {
      const a = shuffled[ptr++];
      const isBye = byePairSet.has(p);
      const b = isBye ? null : shuffled[ptr++];
      matches.push({
        id: genId(), playerAId: a, playerBId: b,
        legsA: isBye ? null : null, legsB: isBye ? null : null,
        status: isBye ? "beendet" : "geplant",
        winnerId: isBye ? a : null,
      });
    }
    return matches;
  }

  function buildNextRound(prevRound) {
    const winners = prevRound.map((m) => m.winnerId);
    const matches = [];
    for (let i = 0; i < winners.length; i += 2) {
      matches.push({ id: genId(), playerAId: winners[i], playerBId: winners[i + 1], legsA: null, legsB: null, status: "geplant", winnerId: null });
    }
    return matches;
  }

  function advanceTournament(rounds) {
    const lastRound = rounds[rounds.length - 1];
    const complete = lastRound.every((m) => m.status === "beendet");
    if (!complete) return { rounds, status: "laufend", winnerId: null };
    if (lastRound.length === 1) return { rounds, status: "beendet", winnerId: lastRound[0].winnerId };
    return { rounds: [...rounds, buildNextRound(lastRound)], status: "laufend", winnerId: null };
  }

  function roundLabel(round, idx) {
    if (round.length === 1) return "Finale";
    if (round.length === 2) return "Halbfinale";
    if (round.length === 4) return "Viertelfinale";
    if (round.length === 8) return "Achtelfinale";
    return "Runde " + (idx + 1);
  }

  function buildKoPhase(standings) {
    const seedPlayer = (rank) => standings[rank - 1].player.id;
    const seeds = {};
    for (let r = 1; r <= 8; r++) seeds[r] = seedPlayer(r);
    const playoff = [
      { id: genId(), playerAId: seeds[3], playerBId: seeds[6], legsA: null, legsB: null, status: "geplant", winnerId: null },
      { id: genId(), playerAId: seeds[4], playerBId: seeds[5], legsA: null, legsB: null, status: "geplant", winnerId: null },
    ];
    return {
      status: "laufend",
      startedAt: firebase.firestore.FieldValue.serverTimestamp(),
      seeds: seeds,
      rounds: [{ name: "Ausspielung", matches: playoff }],
      winnerId: null,
    };
  }

  function advanceKoPhase(koData) {
    const rounds = koData.rounds;
    const last = rounds[rounds.length - 1];
    const complete = last.matches.every((m) => m.status === "beendet");
    if (!complete) return { rounds, status: "laufend", winnerId: null };
    if (last.name === "Ausspielung") {
      const winner36 = last.matches[0].winnerId;
      const winner45 = last.matches[1].winnerId;
      const semis = [
        { id: genId(), playerAId: koData.seeds[1], playerBId: winner45, legsA: null, legsB: null, status: "geplant", winnerId: null },
        { id: genId(), playerAId: koData.seeds[2], playerBId: winner36, legsA: null, legsB: null, status: "geplant", winnerId: null },
      ];
      return { rounds: [...rounds, { name: "Halbfinale", matches: semis }], status: "laufend", winnerId: null };
    }
    if (last.name === "Halbfinale") {
      const final = [{ id: genId(), playerAId: last.matches[0].winnerId, playerBId: last.matches[1].winnerId, legsA: null, legsB: null, status: "geplant", winnerId: null }];
      return { rounds: [...rounds, { name: "Finale", matches: final }], status: "laufend", winnerId: null };
    }
    return { rounds, status: "beendet", winnerId: last.matches[0].winnerId };
  }

  function computeStandings(roundFilter, leagueId) {
    roundFilter = roundFilter || "gesamt";
    leagueId = leagueId || (activeLeague() && activeLeague().id);
    const scopedMatches = leagueId ? matchesForLeague(leagueId) : [];
    const stats = {};
    state.players.forEach((p) => { stats[p.id] = { player: p, played: 0, wins: 0, losses: 0, legsFor: 0, legsAgainst: 0, points: 0 }; });
    scopedMatches
      .filter((m) => m.status === "beendet" && stats[m.playerAId] && stats[m.playerBId] && (roundFilter === "gesamt" || (m.round || "Hinrunde") === roundFilter))
      .forEach((m) => {
        const a = stats[m.playerAId], b = stats[m.playerBId];
        a.played++; b.played++;
        a.legsFor += m.legsA; a.legsAgainst += m.legsB;
        b.legsFor += m.legsB; b.legsAgainst += m.legsA;
        if (m.legsA > m.legsB) { a.wins++; a.points += 2; b.losses++; }
        else if (m.legsB > m.legsA) { b.wins++; b.points += 2; a.losses++; }
      });
    return Object.values(stats).sort((x, y) =>
      y.points - x.points ||
      (y.legsFor - y.legsAgainst) - (x.legsFor - x.legsAgainst) ||
      x.player.name.localeCompare(y.player.name)
    );
  }

  function computePlayerDetail(playerId, roundFilter) {
    roundFilter = roundFilter || "gesamt";
    const lg = activeLeague();
    const scopedMatches = lg ? matchesForLeague(lg.id) : [];
    let wins = 0, losses = 0, legsFor = 0, legsAgainst = 0, played = 0;
    const headToHead = {};
    scopedMatches
      .filter((m) => m.status === "beendet" && (m.playerAId === playerId || m.playerBId === playerId) && (roundFilter === "gesamt" || (m.round || "Hinrunde") === roundFilter))
      .forEach((m) => {
        played++;
        const isA = m.playerAId === playerId;
        const my = isA ? m.legsA : m.legsB;
        const opp = isA ? m.legsB : m.legsA;
        const oppId = isA ? m.playerBId : m.playerAId;
        legsFor += my; legsAgainst += opp;
        if (!headToHead[oppId]) headToHead[oppId] = { wins: 0, losses: 0, legsFor: 0, legsAgainst: 0 };
        headToHead[oppId].legsFor += my;
        headToHead[oppId].legsAgainst += opp;
        if (my > opp) { wins++; headToHead[oppId].wins++; }
        else if (opp > my) { losses++; headToHead[oppId].losses++; }
      });
    let maxCheckout = null, avgSum = 0, avgCount = 0;
    state.matches
      .filter((m) => m.status === "beendet" && (m.playerAId === playerId || m.playerBId === playerId))
      .forEach((m) => {
        const isA = m.playerAId === playerId;
        const co = isA ? m.checkoutA : m.checkoutB;
        const avg = isA ? m.avgA : m.avgB;
        if (co !== null && co !== undefined && co !== "" && !isNaN(co)) { const n = Number(co); if (maxCheckout === null || n > maxCheckout) maxCheckout = n; }
        if (avg !== null && avg !== undefined && avg !== "" && !isNaN(avg)) { avgSum += Number(avg); avgCount++; }
      });
    return { played, wins, losses, legsFor, legsAgainst, headToHead, maxCheckout, avgAverage: avgCount ? avgSum / avgCount : null };
  }

  function resizeImageFile(file, size, quality) {
    size = size || 240; quality = quality || 0.82;
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onerror = () => reject(new Error("Datei konnte nicht gelesen werden"));
      reader.onload = (e) => {
        const img = new Image();
        img.onerror = () => reject(new Error("Bild konnte nicht gelesen werden"));
        img.onload = () => {
          const canvas = document.createElement("canvas");
          canvas.width = size; canvas.height = size;
          const ctx = canvas.getContext("2d");
          const scale = Math.max(size / img.width, size / img.height);
          const w = img.width * scale, h = img.height * scale;
          ctx.drawImage(img, (size - w) / 2, (size - h) / 2, w, h);
          resolve(canvas.toDataURL("image/jpeg", quality));
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    });
  }

    render();
  };

  window.openConfirmKoPhase = function () { state.modal = "confirmKo"; render(); };
  window.confirmStartKoPhase = function () {
    if (!db) return;
    const lg = activeLeague();
    if (!lg) return;
    const standings = computeStandings("gesamt");
    if (standings.length !== 8) return;
    const leagueMatches = matchesForLeague(lg.id);
    const openMatches = leagueMatches.filter((m) => m.status === "geplant").length;
    if (openMatches > 0 || leagueMatches.length === 0) return;
    const koData = buildKoPhase(standings);
    koData.leagueId = lg.id;
    db.collection("koPhase").doc(lg.id).set(koData)
      .then(() => { state.modal = null; render(); })
      .catch((e) => { state.saveError = "KO-Phase konnte nicht gestartet werden: " + e.message; render(); });
  };

  window.openKoResult = function (roundIndex, matchId) {
    const t = currentKoPhase();
    if (!t) return;
    const m = t.rounds[roundIndex].matches.find((x) => x.id === matchId);
    if (!m) return;
    state.activeKoRoundIndex = roundIndex;
    state.activeKoMatchId = matchId;
    state.koResultForm = { legsA: m.legsA == null ? 0 : m.legsA, legsB: m.legsB == null ? 0 : m.legsB };
    state.modal = "koResult";
    render();
  };
  window.stepKoResult = function (side, delta) {
    const key = side === "a" ? "legsA" : "legsB";
    state.koResultForm[key] = Math.max(0, Math.min(9, state.koResultForm[key] + delta));
    render();
  };
  window.confirmKoResult = function () {
    const f = state.koResultForm;
    if (f.legsA === f.legsB || !db) return;
    const t = currentKoPhase();
    if (!t) return;
    const rounds = JSON.parse(JSON.stringify(t.rounds));
    const round = rounds[state.activeKoRoundIndex];
    const match = round.matches.find((x) => x.id === state.activeKoMatchId);
    match.legsA = f.legsA; match.legsB = f.legsB; match.status = "beendet";
    match.winnerId = f.legsA > f.legsB ? match.playerAId : match.playerBId;
    const updated = advanceKoPhase({ seeds: t.seeds, rounds });
    db.collection("koPhase").doc(t.id).update(updated)
      .then(() => {
        state.toast = updated.status === "beendet" ? "KO-Phase beendet – Sieger steht fest!" : "Ergebnis gespeichert";
        render();
        setTimeout(() => { state.toast = ""; render(); }, 2600);
      })
      .catch((e) => { state.saveError = "Ergebnis konnte nicht gespeichert werden: " + e.message; render(); });
    state.modal = null;
    render();
  };

    const app = document.getElementById("app");

    if (!IS_CONFIGURED) { app.innerHTML = renderSetup(); return; }
    if (!state.playersReady || !state.matchesReady || !state.tournamentsReady || !state.koPhaseReady || !state.leaguesReady) { app.innerHTML = renderLoading(); return; }
    app.innerHTML = renderApp();
    const photoInputs = app.querySelectorAll("[data-photo-input]");
    photoInputs.forEach((el) => { el.onchange = () => window.handlePhotoSelect(el.getAttribute("data-photo-input"), el); });
  }

    if (state.standingsRound !== "gesamt") return "";
    const eightPlayers = state.players.length === 8;
    const koPhase = currentKoPhase();
    const lg = activeLeague();
    const leagueMatches = lg ? matchesForLeague(lg.id) : [];

    if (!koPhase) {
      if (!eightPlayers) {
        return `<div style="color:var(--muted);font-size:11px;text-align:center;margin-top:18px;">Die KO-Phase ist für genau 8 Liga-Spieler ausgelegt (aktuell ${state.players.length}).</div>`;
      }
      if (!state.isAdmin) return "";
      const openMatches = leagueMatches.filter((m) => m.status === "geplant").length;
      const canStart = openMatches === 0 && leagueMatches.length > 0;
      return `
        <button class="press ${canStart ? "btn-gold" : "btn-panel"} row center" style="width:100%;gap:6px;padding:12px;font-size:14px;margin-top:18px;${canStart ? "" : "opacity:.4;pointer-events:none;"}" onclick="openConfirmKoPhase()">
          ${iconBracket(16, canStart ? "#241C05" : "var(--muted)")} KO-Phase starten
        </button>
        ${!canStart ? `<div style="color:var(--muted);font-size:11px;text-align:center;margin-top:8px;">Erst möglich, wenn alle Spiele im Spielplan abgeschlossen sind${openMatches > 0 ? ` (noch ${openMatches} offen)` : ""}.</div>` : ""}
      `;
    }

    return `
      <div style="margin-top:24px;">
        <div class="display" style="font-size:16px;font-weight:600;margin-bottom:12px;">🏆 KO-Phase</div>
        ${koPhase.status === "beendet" ? `<div class="card" style="text-align:center;padding:16px;margin-bottom:16px;border-color:var(--gold);"><div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px;">KO-Phase Sieger</div><div class="display" style="font-size:20px;font-weight:600;color:var(--gold);">🏆 ${esc(playerName(koPhase.winnerId))}</div></div>` : ""}
        ${koPhase.rounds.map((round, idx) => `
          <div style="color:var(--muted);font-size:12px;font-weight:500;text-transform:uppercase;letter-spacing:.03em;margin:${idx === 0 ? "0" : "16px"} 0 8px;">${esc(round.name)}</div>
          <div class="col" style="gap:8px;">${round.matches.map((m) => koMatchCardHTML(m, idx)).join("")}</div>
        `).join("")}
      </div>
    `;
  }

  function matchCardHTML(m) {
    const isDone = m.status === "beendet";
    const aWon = isDone && m.legsA > m.legsB;
    const bWon = isDone && m.legsB > m.legsA;
    const round = m.round || "Hinrunde";
    const dateStr = m.date ? new Date(m.date).toLocaleDateString("de-DE", { day: "2-digit", month: "2-digit" }) : "Datum offen";
    const showResultBtn = !isDone || state.isAdmin;
    const hasExtra = isDone && (m.checkoutA != null || m.checkoutB != null || m.avgA != null || m.avgB != null);
    return `<div class="card" style="padding:12px 14px;">
      <div style="margin-bottom:8px;">
        <span style="font-size:10px;font-weight:600;color:var(--muted);background:var(--bg-soft);border-radius:6px;padding:2px 8px;letter-spacing:.03em;">${esc(round)}</span>
      </div>
      <div class="row" style="gap:8px;">
        <span style="flex:1;min-width:0;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:${aWon ? 600 : 500};color:${aWon ? "var(--gold)" : "var(--cream)"}">${esc(playerName(m.playerAId))}</span>
        ${isDone
          ? `<span class="mono" style="font-size:14px;font-weight:700;padding:0 8px;flex-shrink:0;">${m.legsA}–${m.legsB}</span>`
          : `<span style="color:var(--muted);font-size:12px;padding:0 8px;flex-shrink:0;">vs</span>`}
        <span style="flex:1;min-width:0;font-size:14px;text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:${bWon ? 600 : 500};color:${bWon ? "var(--gold)" : "var(--cream)"}">${esc(playerName(m.playerBId))}</span>
      </div>
      ${hasExtra ? `<div class="mono" style="color:var(--muted);font-size:10px;margin-top:6px;text-align:center;">Ø ${m.avgA != null ? m.avgA : "–"} · CO ${m.checkoutA != null ? m.checkoutA : "–"} &nbsp;—&nbsp; Ø ${m.avgB != null ? m.avgB : "–"} · CO ${m.checkoutB != null ? m.checkoutB : "–"}</div>` : ""}
      <div class="row between" style="margin-top:8px;">
        <span style="color:var(--muted);font-size:11px;">${esc(m.mode)} · ${dateStr}</span>
        <div class="row" style="gap:4px;">
          ${showResultBtn ? `<button class="press row" style="gap:4px;border-radius:8px;padding:4px 10px;font-size:11px;font-weight:500;background:${isDone ? "transparent" : "var(--gold)"};color:${isDone ? "var(--muted)" : "#241C05"}" onclick="openResult('${m.id}')">
            ${isDone ? iconPencil(12, "var(--muted)") : iconTarget(12, "#241C05")} ${isDone ? "Bearbeiten" : "Ergebnis"}
          </button>` : ""}
          ${state.isAdmin ? `<button class="press icon-btn" onclick="removeMatch('${m.id}')">${iconTrash(13, "var(--muted)")}</button>` : ""}
        </div>
      </div>
    </div>`;
  }

  function renderScheduleTab() {
    const lg = activeLeague();
    const leagueMatches = lg ? matchesForLeague(lg.id) : [];
    const roundFilter = state.scheduleRoundFilter || "gesamt";
    const playerFilter = state.schedulePlayerFilter || "";
    const passesFilter = (m) => (roundFilter === "gesamt" || (m.round || "Hinrunde") === roundFilter) && (!playerFilter || m.playerAId === playerFilter || m.playerBId === playerFilter);
    const upcoming = leagueMatches.filter((m) => m.status === "geplant" && passesFilter(m));
    const finished = leagueMatches.filter((m) => m.status === "beendet" && passesFilter(m)).slice().reverse();
    const disabled = state.players.length < 2;
    const anyFilterActive = roundFilter !== "gesamt" || !!playerFilter;
    const adminButtons = state.isAdmin ? `
      <div class="row" style="gap:8px;margin-bottom:8px;">
        <button class="press btn-gold row center" style="flex:1;gap:6px;padding:10px;font-size:14px;${disabled ? "opacity:.4;pointer-events:none;" : ""}" onclick="openNewMatch()">${iconPlus(16, "#241C05")} Match</button>
      </div>
      <div class="row" style="gap:8px;margin-bottom:16px;">
        <button class="press btn-panel row center" style="flex:1;gap:6px;padding:9px;font-size:13px;${disabled ? "opacity:.4;pointer-events:none;" : ""}" onclick="openConfirmRR('Hinrunde')">${iconShuffle(14, "var(--cream)")} Hinrunde</button>
        <button class="press btn-panel row center" style="flex:1;gap:6px;padding:9px;font-size:13px;${disabled ? "opacity:.4;pointer-events:none;" : ""}" onclick="openConfirmRR('Rückrunde')">${iconShuffle(14, "var(--cream)")} Rückrunde</button>
      </div>` : "";
    const filterUI = `
      <div class="row" style="gap:6px;margin-bottom:10px;flex-wrap:wrap;">
        ${[["gesamt", "Gesamt"], ["Hinrunde", "Hinrunde"], ["Rückrunde", "Rückrunde"]].map(([val, label]) =>
          `<button class="press mode-chip ${roundFilter === val ? "active" : ""}" onclick="setScheduleRoundFilter('${val}')">${label}</button>`
        ).join("")}
      </div>
      <select class="field-input" style="margin-bottom:18px;" onchange="setSchedulePlayerFilter(this.value)">
        <option value="" ${!playerFilter ? "selected" : ""}>Alle Spieler</option>
        ${state.players.map((p) => `<option value="${p.id}" ${playerFilter === p.id ? "selected" : ""}>${esc(p.name)}</option>`).join("")}
      </select>`;
    return `
      ${adminButtons}
      ${filterUI}
      <div style="color:var(--muted);font-size:12px;font-weight:500;text-transform:uppercase;letter-spacing:.03em;margin-bottom:8px;">Anstehend</div>
      ${upcoming.length === 0
        ? emptyState(iconCalendar(26, "var(--muted)"), "Keine geplanten Matches", anyFilterActive ? "Für diesen Filter gibt es aktuell keine Matches." : (state.isAdmin ? "Leg ein Match an oder erstellt einen Rundenplan für alle Spieler." : "Aktuell sind keine Matches geplant."), true)
        : `<div class="col" style="gap:8px;margin-bottom:24px;">${upcoming.map(matchCardHTML).join("")}</div>`}
      <div style="color:var(--muted);font-size:12px;font-weight:500;text-transform:uppercase;letter-spacing:.03em;margin-bottom:8px;">Gespielt</div>
      ${finished.length === 0
        ? emptyState(iconTarget(26, "var(--muted)"), "Noch keine Ergebnisse", anyFilterActive ? "Für diesen Filter gibt es noch keine Ergebnisse." : "Sobald ein Match beendet ist, taucht es hier auf.", true)
        : `<div class="col" style="gap:8px;">${finished.map(matchCardHTML).join("")}</div>`}
    `;
  }

  function renderPlayersTab() {
    const isAdmin = state.isAdmin;
    return `
      ${isAdmin ? `<div class="row" style="gap:8px;margin-bottom:16px;">
        <input id="new-player-input" class="field-input" placeholder="Name des Spielers" value="${esc(state.newPlayerName)}"
          oninput="setNewPlayerName(this.value)" onkeydown="if(event.key==='Enter'){addPlayer();}">
        <button class="press btn-gold row center" style="padding:0 16px;border-radius:12px;" onclick="addPlayer()">${iconPlus(18, "#241C05")}</button>
      </div>` : ""}
      ${state.players.length === 0
        ? emptyState(iconUsers(28, "var(--muted)"), "Noch keine Spieler", isAdmin ? "Trag oben eure Liga-Mitglieder ein, um loszulegen." : "Der Admin hat noch keine Spieler eingetragen.")
        : `<div class="col" style="gap:8px;">${state.players.map((p) => `
          <div class="card row" style="gap:12px;padding:12px 14px;">
            ${isAdmin ? `<label class="press" style="position:relative;display:block;width:40px;height:40px;flex-shrink:0;cursor:pointer;">
              <input type="file" accept="image/*" data-photo-input="${p.id}" style="display:none;">
              ${avatarHTML(p, 40)}
              <div style="position:absolute;bottom:-2px;right:-2px;border-radius:9999px;padding:4px;display:flex;background:var(--gold);border:2px solid var(--panel);">${iconCamera(9, "#241C05")}</div>
            </label>` : avatarHTML(p, 40)}
            <div style="flex:1;min-width:0;font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${esc(p.name)}</div>
            ${isAdmin ? `<button class="press icon-btn" style="background:${state.confirmDeleteId === p.id ? "var(--red)" : "transparent"};" onclick="deletePlayer('${p.id}')">${iconTrash(16, state.confirmDeleteId === p.id ? "#fff" : "var(--muted)")}</button>` : ""}
          </div>`).join("")}</div>`}
      <div style="color:var(--muted);font-size:11px;margin-top:16px;text-align:center;padding:0 16px;">${isAdmin ? "Diese Liga-Daten sind für alle sichtbar, die diesen Link öffnen." : "Nur der Liga-Admin kann Spieler verwalten."}</div>
    `;
  }

  function tournamentCardHTML(t) {
    const winner = t.winnerId ? playerName(t.winnerId) : null;
    const roundCount = t.rounds ? t.rounds.length : 0;
    const isDone = t.status === "beendet";
    return `<div class="card press" style="padding:14px;" onclick="openTournamentDetail('${t.id}')">
      <div class="row between">
        <span style="font-size:15px;font-weight:600;">${esc(t.name)}</span>
        <span style="font-size:10px;font-weight:600;padding:3px 9px;border-radius:9999px;background:${isDone ? "var(--gold)" : "var(--bg-soft)"};color:${isDone ? "#241C05" : "var(--muted)"};flex-shrink:0;">${isDone ? "Beendet" : "Läuft"}</span>
      </div>
      <div style="color:var(--muted);font-size:12px;margin-top:6px;">${(t.playerIds || []).length} Spieler · ${roundCount} Runde${roundCount === 1 ? "" : "n"}</div>
      ${winner ? `<div class="mono" style="color:var(--gold);font-size:13px;margin-top:8px;">🏆 ${esc(winner)}</div>` : ""}
    </div>`;
  }

  function renderTournamentTab() {
    if (state.tournamentDetailId) return renderTournamentDetail();
    const list = state.tournaments;
    return `
      ${state.isAdmin ? `<button class="press btn-gold row center" style="width:100%;gap:6px;padding:10px;font-size:14px;margin-bottom:16px;" onclick="openNewTournament()">${iconPlus(16, "#241C05")} Neues Turnier</button>` : ""}
      ${list.length === 0
        ? emptyState(iconBracket(28, "var(--muted)"), "Noch keine Turniere", state.isAdmin ? "Starte euer erstes Turnier mit dem Button oben." : "Der Admin hat noch kein Turnier gestartet.")
        : `<div class="col" style="gap:8px;">${list.map(tournamentCardHTML).join("")}</div>`}
    `;
  }

  function tournamentMatchCardHTML(m, roundIndex) {
    const isBye = m.playerBId === null || m.playerBId === undefined;
    const isDone = m.status === "beendet";
    const aWon = isDone && !isBye && m.legsA > m.legsB;
    const bWon = isDone && !isBye && m.legsB > m.legsA;
    const showResultBtn = !isBye && (!isDone || state.isAdmin);
    return `<div class="card" style="padding:12px 14px;">
      <div class="row" style="gap:8px;">
        <span style="flex:1;min-width:0;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:${aWon ? 600 : 500};color:${aWon ? "var(--gold)" : "var(--cream)"}">${esc(playerName(m.playerAId))}</span>
        ${isBye
          ? `<span style="color:var(--muted);font-size:11px;padding:0 8px;flex-shrink:0;">Freilos</span>`
          : isDone
            ? `<span class="mono" style="font-size:14px;font-weight:700;padding:0 8px;flex-shrink:0;">${m.legsA}–${m.legsB}</span>`
            : `<span style="color:var(--muted);font-size:12px;padding:0 8px;flex-shrink:0;">vs</span>`}
        <span style="flex:1;min-width:0;font-size:14px;text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:${bWon ? 600 : 500};color:${bWon ? "var(--gold)" : "var(--cream)"}">${isBye ? "" : esc(playerName(m.playerBId))}</span>
      </div>
      ${showResultBtn ? `<div style="margin-top:8px;text-align:right;">
        <button class="press row" style="gap:4px;border-radius:8px;padding:4px 10px;font-size:11px;font-weight:500;background:${isDone ? "transparent" : "var(--gold)"};color:${isDone ? "var(--muted)" : "#241C05"};display:inline-flex;" onclick="openTournamentResult(${roundIndex},'${m.id}')">
          ${isDone ? iconPencil(12, "var(--muted)") : iconTarget(12, "#241C05")} ${isDone ? "Bearbeiten" : "Ergebnis"}
        </button>
      </div>` : ""}
    </div>`;
  }

  function renderTournamentDetail() {
    const t = state.tournaments.find((x) => x.id === state.tournamentDetailId);
    if (!t) { state.tournamentDetailId = null; return renderTournamentTab(); }
    const rounds = t.rounds || [];
    return `
      <button class="press row" style="gap:4px;margin-bottom:14px;background:transparent;color:var(--muted);font-size:13px;padding:0;" onclick="closeTournamentDetail()">${iconChevronLeft(14, "var(--muted)")} Zurück zu Turnieren</button>
      <div class="display" style="font-size:18px;font-weight:600;margin-bottom:12px;">${esc(t.name)}</div>
      ${t.winnerId ? `<div class="card" style="text-align:center;padding:16px;margin-bottom:18px;border-color:var(--gold);"><div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px;">Turniersieger</div><div class="display" style="font-size:20px;font-weight:600;color:var(--gold);">🏆 ${esc(playerName(t.winnerId))}</div></div>` : ""}
      ${rounds.map((round, idx) => `
        <div style="color:var(--muted);font-size:12px;font-weight:500;text-transform:uppercase;letter-spacing:.03em;margin:${idx === 0 ? "0" : "18px"} 0 8px;">${roundLabel(round, idx)}</div>
        <div class="col" style="gap:8px;">${round.map((m) => tournamentMatchCardHTML(m, idx)).join("")}</div>
      `).join("")}
    `;
  }

  function modalShell(title, bodyHtml, footerHtml) {
    return `<div class="modal-overlay" onclick="closeModal()">
      <div class="modal-panel" onclick="event.stopPropagation()">
        <div class="row between" style="margin-bottom:16px;">
          <span class="display" style="font-size:16px;font-weight:600;">${esc(title)}</span>
          <button class="press icon-btn" style="background:var(--bg-soft);border-radius:9999px;" onclick="closeModal()">${iconX(16, "var(--muted)")}</button>
        </div>
        ${bodyHtml}
        <div class="row" style="gap:8px;margin-top:20px;">
          <button class="press btn-soft" style="padding:10px 16px;font-size:14px;font-weight:500;" onclick="closeModal()">Abbrechen</button>
          ${footerHtml}
        </div>
      </div>
    </div>`;
  }

  function renderModal() {
    if (state.modal === "newMatch") return renderNewMatchModal();
    if (state.modal === "confirmRR") return renderConfirmRRModal();
    if (state.modal === "result") return renderResultModal();
    if (state.modal === "adminLogin") return renderAdminLoginModal();
    if (state.modal === "playerDetail") return renderPlayerDetailModal();
    if (state.modal === "newTournament") return renderNewTournamentModal();
    if (state.modal === "tournamentResult") return renderTournamentResultModal();
    if (state.modal === "confirmKo") return renderConfirmKoModal();
    if (state.modal === "koResult") return renderKoResultModal();
    if (state.modal === "home") return renderHomeModal();
    return "";
  }

  function renderNewMatchModal() {
    const f = state.newMatchForm;
    const playerOptions = (selected) => state.players.map((p) => `<option value="${p.id}" ${p.id === selected ? "selected" : ""}>${esc(p.name)}</option>`).join("");
    const canCreate = f.a && f.b && f.a !== f.b;
    const body = `<div class="col" style="gap:12px;">
      <div>
        <div style="color:var(--muted);font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.03em;margin-bottom:6px;">Spieler A</div>
        <select class="field-input" onchange="setNewMatchField('a', this.value)">${playerOptions(f.a)}</select>
      </div>
      <div>
        <div style="color:var(--muted);font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.03em;margin-bottom:6px;">Spieler B</div>
        <select class="field-input" onchange="setNewMatchField('b', this.value)">${playerOptions(f.b)}</select>
      </div>
      ${f.a && f.b && f.a === f.b ? `<div style="color:var(--red);font-size:12px;margin-top:-4px;">Spieler A und B müssen unterschiedlich sein.</div>` : ""}
      <div>
        <div style="color:var(--muted);font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.03em;margin-bottom:6px;">Runde</div>
        <div class="row" style="gap:6px;">
          ${ROUNDS.map((r) => `<button class="press mode-chip ${f.round === r ? "active" : ""}" onclick="setNewMatchField('round','${r}')">${r}</button>`).join("")}
        </div>
      </div>
      <div>
        <div style="color:var(--muted);font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.03em;margin-bottom:6px;">Modus</div>
        <div class="row" style="gap:6px;flex-wrap:wrap;">
          ${MODES.map((md) => `<button class="press mode-chip ${f.mode === md ? "active" : ""}" onclick="setNewMatchField('mode','${md}')">${md}</button>`).join("")}
        </div>
      </div>
      <div>
        <div style="color:var(--muted);font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.03em;margin-bottom:6px;">Datum (optional)</div>
        <input type="date" class="field-input" style="color-scheme:dark;" value="${esc(f.date)}" onchange="setNewMatchField('date', this.value)">
      </div>
    </div>`;
    const footer = `<button class="press btn-gold" style="flex:1;padding:10px;font-size:14px;font-weight:600;${canCreate ? "" : "opacity:.4;pointer-events:none;"}" onclick="confirmCreateMatch()">Anlegen</button>`;
    return modalShell("Neues Match", body, footer);
  }

  function renderConfirmRRModal() {
    const n = state.players.length;
    const count = (n * (n - 1)) / 2;
    const round = state.pendingRRRound || "Hinrunde";
    const body = `<p style="color:var(--cream-dim);font-size:14px;margin:0;">Erstellt ${count} Matches für die <b style="color:var(--cream);">${esc(round)}</b> — jeder Spieler einmal gegen jeden anderen.</p>`;
    const footer = `<button class="press btn-gold" style="flex:1;padding:10px;font-size:14px;font-weight:600;" onclick="confirmRoundRobin()">Erstellen</button>`;
    return modalShell(round + " erstellen?", body, footer);
  }

  function renderPlayerDetailModal() {
    const player = state.players.find((p) => p.id === state.detailPlayerId);
    if (!player) return "";
    const roundFilter = state.standingsRound || "gesamt";
    const d = computePlayerDetail(player.id, roundFilter);
    const h2h = Object.keys(d.headToHead).map((oppId) => ({ name: playerName(oppId), ...d.headToHead[oppId] })).sort((a, b) => a.name.localeCompare(b.name));
    const body = `
      <div class="row" style="gap:12px;margin-bottom:16px;">
        ${avatarHTML(player, 48)}
        <div>
          <div style="font-size:16px;font-weight:600;">${esc(player.name)}</div>
          <div class="mono" style="color:var(--muted);font-size:12px;margin-top:2px;">${d.played} Sp · ${d.wins}S–${d.losses}N · Legs ${d.legsFor}:${d.legsAgainst}</div>
        </div>
      </div>
      <div class="row" style="gap:10px;margin-bottom:18px;">
        <div class="card" style="flex:1;text-align:center;padding:10px;">
          <div class="display" style="color:var(--gold);font-size:20px;font-weight:600;">${d.maxCheckout != null ? d.maxCheckout : "–"}</div>
          <div style="color:var(--muted);font-size:10px;margin-top:4px;">Höchster Checkout</div>
        </div>
        <div class="card" style="flex:1;text-align:center;padding:10px;">
          <div class="display" style="color:var(--gold);font-size:20px;font-weight:600;">${d.avgAverage != null ? d.avgAverage.toFixed(1) : "–"}</div>
          <div style="color:var(--muted);font-size:10px;margin-top:4px;">Ø Average</div>
        </div>
      </div>
      <div style="color:var(--muted);font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.03em;margin-bottom:8px;">Bilanz gegen Gegner${roundFilter !== "gesamt" ? " (" + esc(roundFilter) + ")" : ""}</div>
      ${h2h.length === 0
        ? `<div style="color:var(--muted);font-size:13px;">Noch keine gespielten Matches.</div>`
        : `<div class="col" style="gap:2px;max-height:220px;overflow-y:auto;">${h2h.map((e) => `
          <div class="row between" style="padding:8px 2px;border-bottom:1px solid var(--panel-border);">
            <span style="font-size:13px;">${esc(e.name)}</span>
            <div style="text-align:right;">
              <div class="mono" style="color:var(--cream-dim);font-size:12px;">${e.wins}S–${e.losses}N</div>
              <div class="mono" style="color:var(--muted);font-size:10px;margin-top:1px;">Legs ${e.legsFor}:${e.legsAgainst}</div>
            </div>
          </div>`).join("")}</div>`}
    `;
    return modalShell(player.name, body, "");
  }

  function renderAdminLoginModal() {
    const body = `<div class="col" style="gap:10px;">
      <p style="color:var(--cream-dim);font-size:13px;margin:0;">PIN eingeben, um Spieler-Verwaltung und Match-Anlage freizuschalten.</p>
      <input id="admin-pin-input" class="field-input mono" type="password" inputmode="numeric" placeholder="PIN"
        oninput="setAdminPinInput(this.value)" onkeydown="if(event.key==='Enter'){submitAdminPin();}"
        style="text-align:center;letter-spacing:.3em;font-size:18px;">
      ${state.pinError ? `<div style="color:var(--red);font-size:12px;">${esc(state.pinError)}</div>` : ""}
    </div>`;
    const footer = `<button class="press btn-gold" style="flex:1;padding:10px;font-size:14px;font-weight:600;" onclick="submitAdminPin()">Entsperren</button>`;
    return modalShell("Admin-Zugang", body, footer);
  }

  function renderResultModal() {
    const m = state.matches.find((x) => x.id === state.activeMatchId);
    if (!m) return "";
    const f = state.resultForm;
    const canSubmit = f.legsA !== f.legsB;
    const body = `<div class="row" style="gap:12px;align-items:center;">
        ${legStepperHTML(playerName(m.playerAId), f.legsA, "stepResult('a',-1)", "stepResult('a',1)")}
        <span style="color:var(--muted);font-size:13px;font-weight:500;">Legs</span>
        ${legStepperHTML(playerName(m.playerBId), f.legsB, "stepResult('b',-1)", "stepResult('b',1)")}
      </div>
      ${!canSubmit ? `<div style="color:var(--red);font-size:12px;text-align:center;margin-top:12px;">Unentschieden ist nicht möglich — ein Spieler muss mehr Legs haben.</div>` : ""}
      <div class="row" style="gap:10px;margin-top:18px;">
        <div style="flex:1;">
          <div style="color:var(--muted);font-size:10px;font-weight:500;text-transform:uppercase;margin-bottom:6px;">Checkout ${esc(playerName(m.playerAId))}</div>
          <input class="field-input" type="number" inputmode="numeric" placeholder="z.B. 121" value="${esc(f.checkoutA)}" oninput="setResultField('checkoutA', this.value)">
        </div>
        <div style="flex:1;">
          <div style="color:var(--muted);font-size:10px;font-weight:500;text-transform:uppercase;margin-bottom:6px;">Checkout ${esc(playerName(m.playerBId))}</div>
          <input class="field-input" type="number" inputmode="numeric" placeholder="z.B. 121" value="${esc(f.checkoutB)}" oninput="setResultField('checkoutB', this.value)">
        </div>
      </div>
      <div class="row" style="gap:10px;margin-top:10px;">
        <div style="flex:1;">
          <div style="color:var(--muted);font-size:10px;font-weight:500;text-transform:uppercase;margin-bottom:6px;">Average ${esc(playerName(m.playerAId))}</div>
          <input class="field-input" type="number" step="0.01" inputmode="decimal" placeholder="z.B. 55.3" value="${esc(f.avgA)}" oninput="setResultField('avgA', this.value)">
        </div>
        <div style="flex:1;">
          <div style="color:var(--muted);font-size:10px;font-weight:500;text-transform:uppercase;margin-bottom:6px;">Average ${esc(playerName(m.playerBId))}</div>
          <input class="field-input" type="number" step="0.01" inputmode="decimal" placeholder="z.B. 55.3" value="${esc(f.avgB)}" oninput="setResultField('avgB', this.value)">
        </div>
      </div>
      <div style="color:var(--muted);font-size:11px;margin-top:10px;">Checkout & Average sind optional.</div>
      ${m.status === "beendet" && state.isAdmin ? `<button class="press" style="background:transparent;color:var(--red);font-size:12px;margin-top:14px;text-decoration:underline;padding:0;" onclick="resetResult()">Ergebnis zurücksetzen (Match bleibt im Spielplan)</button>` : ""}`;
    const footer = `<button class="press btn-gold row center" style="flex:1;gap:6px;padding:10px;font-size:14px;font-weight:600;${canSubmit ? "" : "opacity:.4;pointer-events:none;"}" onclick="confirmResult()">${iconCheck(16, "#241C05")} Speichern</button>`;
    return modalShell("Ergebnis eintragen", body, footer);
  }

  function renderNewTournamentModal() {
    if (state.tournamentWizardStep === "name") {
      const body = `<div>
        <div style="color:var(--muted);font-size:11px;font-weight:500;text-transform:uppercase;margin-bottom:6px;">Turniername</div>
        <input id="tournament-name-input" class="field-input" placeholder="z.B. Sommerturnier 2026" value="${esc(state.tournamentWizardName)}"
          oninput="setTournamentWizardName(this.value)" onkeydown="if(event.key==='Enter'){goToTournamentPlayersStep();}">
      </div>`;
      const footer = `<button class="press btn-gold" style="flex:1;padding:10px;font-size:14px;font-weight:600;" onclick="goToTournamentPlayersStep()">Weiter</button>`;
      return modalShell("Neues Turnier", body, footer);
    }
    const selected = state.tournamentWizardPlayerIds;
    const nonPow2 = selected.length > 0 && (selected.length & (selected.length - 1)) !== 0;
    const body = `
      <button class="press" style="background:transparent;color:var(--muted);font-size:12px;margin-bottom:10px;padding:0;" onclick="backToTournamentNameStep()">${iconChevronLeft(12, "var(--muted)")} ${esc(state.tournamentWizardName)}</button>
      <div style="color:var(--muted);font-size:12px;margin-bottom:12px;">Wähl die Teilnehmer aus (mind. 2)</div>
      <div class="col" style="gap:6px;max-height:280px;overflow-y:auto;">
        ${state.players.map((p) => `
          <button class="press row between" style="width:100%;background:${selected.includes(p.id) ? "rgba(203,161,53,0.15)" : "var(--bg-soft)"};border:1px solid ${selected.includes(p.id) ? "var(--gold)" : "var(--panel-border)"};border-radius:12px;padding:10px 12px;" onclick="toggleTournamentPlayer('${p.id}')">
            <span class="row" style="gap:10px;">${avatarHTML(p, 28)}<span style="font-size:13px;">${esc(p.name)}</span></span>
            ${selected.includes(p.id) ? iconCheck(16, "var(--gold)") : ""}
          </button>
        `).join("")}
      </div>
      <div style="color:var(--muted);font-size:11px;margin-top:10px;">${selected.length} ausgewählt${nonPow2 ? " · wird automatisch mit Freilosen aufgefüllt" : ""}</div>
    `;
    const footer = `<button class="press btn-gold" style="flex:1;padding:10px;font-size:14px;font-weight:600;${selected.length < 2 ? "opacity:.4;pointer-events:none;" : ""}" onclick="confirmCreateTournament()">Turnier erstellen & starten</button>`;
    return modalShell("Spieler auswählen", body, footer);
  }

  function renderTournamentResultModal() {
    const t = state.tournaments.find((x) => x.id === state.tournamentDetailId);
    if (!t) return "";
    const m = t.rounds[state.activeRoundIndex].find((x) => x.id === state.activeTournamentMatchId);
    if (!m) return "";
    const f = state.tournamentResultForm;
    const canSubmit = f.legsA !== f.legsB;
    const body = `<div class="row" style="gap:12px;align-items:center;">
        ${legStepperHTML(playerName(m.playerAId), f.legsA, "stepTournamentResult('a',-1)", "stepTournamentResult('a',1)")}
        <span style="color:var(--muted);font-size:13px;font-weight:500;">Legs</span>
        ${legStepperHTML(playerName(m.playerBId), f.legsB, "stepTournamentResult('b',-1)", "stepTournamentResult('b',1)")}
      </div>
      ${!canSubmit ? `<div style="color:var(--red);font-size:12px;text-align:center;margin-top:12px;">Unentschieden ist nicht möglich — ein Spieler muss mehr Legs haben.</div>` : ""}`;
    const footer = `<button class="press btn-gold row center" style="flex:1;gap:6px;padding:10px;font-size:14px;font-weight:600;${canSubmit ? "" : "opacity:.4;pointer-events:none;"}" onclick="confirmTournamentResult()">${iconCheck(16, "#241C05")} Speichern</button>`;
    return modalShell("Ergebnis eintragen", body, footer);
  }

  function renderConfirmKoModal() {
    const body = `<p style="color:var(--cream-dim);font-size:14px;margin:0;">Platz 1–2 gehen direkt ins Halbfinale. Platz 3–6 spielen die Ausspielung (3 gegen 6, 4 gegen 5). Platz 7–8 scheiden aus. Das lässt sich danach nicht mehr rückgängig machen.</p>`;
    const footer = `<button class="press btn-gold" style="flex:1;padding:10px;font-size:14px;font-weight:600;" onclick="confirmStartKoPhase()">KO-Phase starten</button>`;
    return modalShell("KO-Phase starten?", body, footer);
  }

  function renderKoResultModal() {
    const t = currentKoPhase();
    if (!t) return "";
    const m = t.rounds[state.activeKoRoundIndex].matches.find((x) => x.id === state.activeKoMatchId);
    if (!m) return "";
    const f = state.koResultForm;
    const canSubmit = f.legsA !== f.legsB;
    const body = `<div class="row" style="gap:12px;align-items:center;">
        ${legStepperHTML(playerName(m.playerAId), f.legsA, "stepKoResult('a',-1)", "stepKoResult('a',1)")}
        <span style="color:var(--muted);font-size:13px;font-weight:500;">Legs</span>
        ${legStepperHTML(playerName(m.playerBId), f.legsB, "stepKoResult('b',-1)", "stepKoResult('b',1)")}
      </div>
      ${!canSubmit ? `<div style="color:var(--red);font-size:12px;text-align:center;margin-top:12px;">Unentschieden ist nicht möglich — ein Spieler muss mehr Legs haben.</div>` : ""}`;
    const footer = `<button class="press btn-gold row center" style="flex:1;gap:6px;padding:10px;font-size:14px;font-weight:600;${canSubmit ? "" : "opacity:.4;pointer-events:none;"}" onclick="confirmKoResult()">${iconCheck(16, "#241C05")} Speichern</button>`;
    return modalShell("Ergebnis eintragen", body, footer);
  }

  function renderHomeModal() {
    if (state.homeView === "newLeague") return renderNewLeagueStep();
    if (state.homeView === "history") return renderLeagueHistoryStep();
    return renderHomeMain();
  }

  function renderHomeMain() {
    const lg = activeLeague();
    const archived = state.leagues.filter((l) => l.status !== "aktiv").slice().sort((a, b) => tsVal(b.archivedAt) - tsVal(a.archivedAt));
    const body = `
      <div class="card" style="padding:14px;margin-bottom:16px;border-color:var(--gold);">
        <div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px;">Aktuelle Liga</div>
        <div class="display" style="font-size:17px;font-weight:600;color:var(--gold);">${esc(lg ? lg.name : "–")}</div>
      </div>
      ${state.isAdmin ? `<button class="press btn-gold row center" style="width:100%;gap:6px;padding:10px;font-size:14px;margin-bottom:20px;" onclick="openNewLeagueStep()">${iconPlus(16, "#241C05")} Neue Liga erstellen</button>` : ""}
      <div style="color:var(--muted);font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.03em;margin-bottom:8px;">Vergangene Ligen</div>
      ${archived.length === 0
        ? `<div style="color:var(--muted);font-size:13px;">Noch keine archivierten Ligen.</div>`
        : `<div class="col" style="gap:8px;">${archived.map((l) => `
          <button class="press card row between" style="width:100%;padding:12px 14px;" onclick="openLeagueHistory('${l.id}')">
            <span style="font-size:14px;font-weight:500;">${esc(l.name)}</span>
            ${l.winnerName ? `<span class="mono" style="color:var(--gold);font-size:12px;">🏆 ${esc(l.winnerName)}</span>` : ""}
          </button>`).join("")}</div>`}
    `;
    return modalShell("Home", body, "");
  }

  function renderNewLeagueStep() {
    const lg = activeLeague();
    const canCreate = (state.newLeagueName || "").trim().length > 0;
    const body = `
      <button class="press" style="background:transparent;color:var(--muted);font-size:12px;margin-bottom:12px;padding:0;" onclick="backToHomeMain()">${iconChevronLeft(12, "var(--muted)")} Zurück</button>
      <div style="color:var(--cream-dim);font-size:13px;margin-bottom:14px;line-height:1.5;">Die aktuelle Liga "${esc(lg ? lg.name : "")}" wird archiviert (Tabelle bleibt einsehbar). Spielplan, Tabelle und KO-Phase starten für die neue Liga komplett neu. Eure Spielerliste bleibt erhalten.</div>
      <div style="color:var(--muted);font-size:11px;font-weight:500;text-transform:uppercase;margin-bottom:6px;">Name der neuen Liga</div>
      <input id="new-league-input" class="field-input" placeholder="z.B. August 2026" value="${esc(state.newLeagueName)}" oninput="setNewLeagueName(this.value)" onkeydown="if(event.key==='Enter'){confirmCreateLeague();}">
    `;
    const footer = `<button class="press btn-gold" style="flex:1;padding:10px;font-size:14px;font-weight:600;${canCreate ? "" : "opacity:.4;pointer-events:none;"}" onclick="confirmCreateLeague()">Liga starten</button>`;
    return modalShell("Neue Liga", body, footer);
  }

  function renderLeagueHistoryStep() {
    const lg = state.leagues.find((l) => l.id === state.historyLeagueId);
    if (!lg) return renderHomeMain();
    const standings = computeStandings("gesamt", lg.id);
    const body = `
      <button class="press" style="background:transparent;color:var(--muted);font-size:12px;margin-bottom:12px;padding:0;" onclick="backToHomeMain()">${iconChevronLeft(12, "var(--muted)")} Zurück</button>
      <div class="display" style="font-size:16px;font-weight:600;margin-bottom:12px;">${esc(lg.name)}</div>
      ${standings.length === 0
        ? `<div style="color:var(--muted);font-size:13px;">Keine Ergebnisse in dieser Liga.</div>`
        : `<div class="col" style="gap:6px;max-height:360px;overflow-y:auto;">${standings.map((s, i) => `
          <div class="row" style="gap:10px;padding:8px 2px;border-bottom:1px solid var(--panel-border);">
            <span class="mono" style="width:18px;color:var(--muted);font-size:12px;">${i + 1}</span>
            ${avatarHTML(s.player, 26)}
            <span style="flex:1;min-width:0;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${esc(s.player.name)}</span>
            <span class="mono" style="color:var(--gold);font-size:13px;font-weight:600;flex-shrink:0;">${s.points} Pkt</span>
          </div>`).join("")}</div>`}
    `;
    return modalShell("Liga-Archiv", body, "");
  }

  render();
</script>
</body>
</html>
